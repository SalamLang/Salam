---
# Example workflow for consumers of the Setup Salam action.
# Copy this into your own repository at .github/workflows/salam.yml
name: Salam CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  run:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Salam
        id: salam
        uses: SalamLang/Salam/.github/actions/setup-salam@main
        with:
          version: latest

      - name: Show what got installed
        shell: bash
        run: |
          echo "version   : ${{ steps.salam.outputs.version }}"
          echo "tag       : ${{ steps.salam.outputs.tag }}"
          echo "cache-hit : ${{ steps.salam.outputs.cache-hit }}"
          echo "salam     : ${{ steps.salam.outputs.salam }}"
          salam version

      - name: Run with the interpreter
        run: salam exec examples/hello.salam

      - name: Build a native binary and run it
        shell: bash
        run: |
          salam build examples/hello.salam -o hello
          ./hello
