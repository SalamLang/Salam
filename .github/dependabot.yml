---
version: 2
updates:
  - package-ecosystem: bun
    directory: /
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      bun-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      github-actions-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7
  - package-ecosystem: pre-commit
    directory: /
    open-pull-requests-limit: 2
    schedule:
      interval: weekly
    groups:
      pre-commit-hooks:
        patterns:
          - '*'
    cooldown:
      default-days: 7
