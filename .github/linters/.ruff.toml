# Ruff's own default (88) -- kept explicit so Super-Linter's PYTHON_RUFF and
# PYTHON_RUFF_FORMAT checks use the same line length as the local
# ruff-pre-commit hook (which runs with no args, i.e. ruff's defaults).
# Without this file Super-Linter falls back to its bundled template, which
# sets line-length = 120 and disagrees with what `prek`/pre-commit enforces
# locally on every commit.
line-length = 88
