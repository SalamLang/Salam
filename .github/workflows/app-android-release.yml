---
name: 📱 Application - Build Android APK + AAB
# checkov:skip=CKV_GHA_7:inputs are only ever read via env: indirection, never interpolated into a run: script
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App versionName (e.g. 1.0). Blank keeps the build.gradle.kts default.'
        required: false
        type: string
      version_code:
        description: 'App versionCode (integer). Blank keeps the build.gradle.kts default.'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/app-android-release.yml'
      - '.github/workflows/_reusable-android-build.yml'
permissions:
  contents: read
concurrency:
  group: application-android-release
  cancel-in-progress: false
jobs:
  build:
    name: Build & sign AAB + universal APK + per-ABI APKs
    uses: ./.github/workflows/_reusable-android-build.yml
    secrets: inherit
    with:
      version_name: ${{ inputs.version_name || '' }}
      version_code: ${{ inputs.version_code || '' }}
