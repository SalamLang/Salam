name: 🧹 Biome
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  biome:
    name: Biome (pinned 2.5.1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Biome is pinned in package.json + package-lock.json (devDependency
      # @biomejs/biome 2.5.1). We run our own copy instead of Super-Linter's
      # bundled Biome so the version is reproducible and under our control
      # (Super-Linter's BIOME_LINT/BIOME_FORMAT are disabled in super-linter.yml).
      - name: Install pinned Biome
        run: npm ci
      - name: Run Biome (lint + format + assist check)
        run: npx biome ci --max-diagnostics=none .
