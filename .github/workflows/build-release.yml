name: 🚀 Build and Release Salam
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build-linux:
    name: Build Salam for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: sudo apt-get install build-essential
      - name: 'GCC Version'
        run: |
          gcc --version
      - name: Build salam for Linux
        run: |
          make -C compiler -j"$(nproc)"
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux
          path: compiler/salam
  build-macos:
    name: Build Salam for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'GCC Version'
        run: |
          gcc --version
      - name: Build salam for macOS
        run: |
          make -C compiler
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-macos
          path: compiler/salam
  build-windows:
    name: Build Salam for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Use the MSYS2 toolchain preinstalled at C:\msys64 so the gcc that
      # builds salam.exe and the static libLLVM we link against share one ABI.
      - name: Install MINGW64 toolchain + static LLVM
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
        run: |
          pacman -Sy --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-llvm \
            make
          gcc --version | head -1
          llvm-config --version

      # libLLVM is linked statically INTO salam.exe (the LLVM backend then runs
      # in-process: no external clang/llc/lli, no WSL). -static also folds in
      # libstdc++/libgcc/winpthread so salam.exe is a single standalone binary.
      - name: Build salam.exe with embedded LLVM (static)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
        run: |
          make -C compiler -j2 \
            WITH_LLVM=1 LLVM_LINK_STATIC=1 LLVM_CONFIG=llvm-config CC=gcc \
            EXTRA_LDFLAGS="-static -static-libgcc -static-libstdc++"
          test -f compiler/salam.exe || mv compiler/salam compiler/salam.exe
          ./compiler/salam.exe version

      - name: Stage self-contained bundle
        shell: bash
        run: |
          set -eu
          DIST="salam-windows"
          mkdir -p "$DIST"
          cp compiler/salam.exe "$DIST/"
          cp -r compiler/std    "$DIST/std"
          # Bundle a real Tiny C Compiler next to salam for the default C
          # backend (salam build). salam auto-discovers <dir>/tcc/tcc.exe.
          curl -fsSL -o tcc.zip \
            https://download.savannah.gnu.org/releases/tinycc/tcc-0.9.27-win64-bin.zip
          7z x tcc.zip -o"$DIST" >/dev/null
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Windows - self-contained."
            echo ""
            echo "No installation needed. From this folder:"
            echo ""
            echo "  salam.exe version"
            echo "  salam.exe exec  myprogram.salam              (tree-walking interpreter)"
            echo "  salam.exe build myprogram.salam              (C backend via bundled tcc)"
            echo "  salam.exe llvm  myprogram.salam --jit        (run via the built-in LLVM)"
            echo "  salam.exe llvm  myprogram.salam --exec       (native exe via built-in LLVM)"
            echo ""
            echo "LLVM is compiled into salam.exe itself - no clang/llc/lli needed."
            echo "salam.exe finds its std/ library and the bundled tcc/ automatically;"
            echo "keep them next to salam.exe."
          } > "$DIST/RUN-ME.txt"
          echo "bundle contents:"; ls -la "$DIST"

      - name: Zip the bundle
        shell: bash
        run: |
          7z a -tzip salam-windows.zip salam-windows >/dev/null
          ls -la salam-windows.zip

      - name: Upload self-contained bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-bundle
          path: salam-windows.zip

      - name: Upload salam.exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows
          path: compiler/salam.exe
  create-release:
    if: |
      startsWith(github.event.head_commit.message, 'release:') &&
      github.repository == 'SalamLang/Salam'
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Read version from VERSION file
        id: get_version
        run: |
          VERSION=$(cat VERSION | sed 's/^[ \t]*//;s/[ \t]*$//')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Salam version: ${VERSION}"
      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux
          path: ./release
      - name: Rename Linux binary to avoid conflict
        run: |
          mv ./release/salam ./release/salam-linux
      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-macos
          path: ./release
      - name: Rename macOS binary to avoid conflict
        run: |
          mv ./release/salam ./release/salam-mac
      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows
          path: ./release
      - name: Rename Window binary
        run: |
          mv ./release/salam.exe ./release/salam-windows.exe
      - name: Download Windows self-contained bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-bundle
          path: ./release
      - name: Post Linux release file to SERVER_VERSIONS_API
        env:
          SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
          SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
        run: |
          curl -X POST "$SERVER_VERSIONS_API" \
            -F "file=@./release/salam-linux" \
            -F "version=${{ env.VERSION }}" \
            -F "date=$(date +'%Y-%m-%d')" \
            -F "time=$(date +'%H:%M:%S')" \
            -F "key='$SERVER_VERSIONS_KEY'" \
            -F "platform=linux"
      - name: Post macOS release file to SERVER_VERSIONS_API
        env:
          SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
          SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
        run: |
          curl -X POST "$SERVER_VERSIONS_API" \
            -F "file=@./release/salam-mac" \
            -F "version=${{ env.VERSION }}" \
            -F "date=$(date +'%Y-%m-%d')" \
            -F "time=$(date +'%H:%M:%S')" \
            -F "key='$SERVER_VERSIONS_KEY'" \
            -F "platform=macos"
      - name: Post Windows release file to SERVER_VERSIONS_API
        env:
          SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
          SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
        run: |
          curl -X POST "$SERVER_VERSIONS_API" \
            -F "file=@./release/salam-windows.exe" \
            -F "version=${{ env.VERSION }}" \
            -F "date=$(date +'%Y-%m-%d')" \
            -F "time=$(date +'%H:%M:%S')" \
            -F "key='$SERVER_VERSIONS_KEY'" \
            -F "platform=windows"
      - name: Set up GitHub CLI
        run: sudo apt-get install gh -y
      - name: Authenticate GitHub CLI
        run: gh auth login --with-token <<< ${{ secrets.GITHUB_TOKEN }}
      - name: Delete existing release and tag if found
        run: |
          VERSION="v${{ env.VERSION }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "Release $VERSION exists. Deleting release..."
            gh release delete "$VERSION" --yes
          else
            echo "Release $VERSION does not exist."
          fi
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION exists locally. Deleting tag..."
            git tag -d "$VERSION" || true
          else
            echo "Tag $VERSION does not exist locally."
          fi
          if git ls-remote --tags origin | grep "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION exists on remote. Deleting remote tag..."
            git push origin :refs/tags/"$VERSION" || true
          else
            echo "Tag $VERSION does not exist on remote."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create new Git tag
        run: |
          git tag v${{ env.VERSION }}
          git push origin v${{ env.VERSION }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create new GitHub Release and Tag
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: 'v${{ env.VERSION }}'
          name: 'Salam Release v${{ env.VERSION }}'
          body: 'This release includes the latest build for Linux, macOS, and Windows.'
          files: |
            release/salam-linux
            release/salam-mac
            release/salam-windows.exe
            release/salam-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
