name: 🚀 Build and Release Salam
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build-linux:
    name: Build Salam for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies (static LLVM + system deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache \
            llvm-18-dev libzstd-dev zlib1g-dev libtinfo-dev libxml2-dev
          gcc --version | head -1
          llvm-config-18 --version
      - name: Cache ccache (Linux)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.run_id }}
          restore-keys: |
            ccache-linux-
      - name: Build salam for Linux (embedded static LLVM)
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=500M >/dev/null 2>&1 || true
          make -C compiler -j"$(nproc)" \
            WITH_LLVM=1 LLVM_LINK_STATIC=1 LLVM_CONFIG=llvm-config-18 CC="ccache gcc" \
            EXTRA_LDFLAGS="-static-libgcc -static-libstdc++"
          ccache --show-stats 2>/dev/null | head -5 || true
          ./salam version
      - name: Smoke-test the embedded LLVM backend
        run: |
          printf 'func main:\n    __ "ok-llvm"\nend\n' > smoke.salam
          ./salam llvm smoke.salam --jit --log-level=warn
          ./salam llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
          ./salam llvm smoke.salam --exec -o smoke_exe --log-level=warn && ./smoke_exe
          rm -f smoke.salam smoke_exe smoke.o salam_mod_*.c salam_mod_*.h
      - name: Validate full test suite (release gate)
        if: startsWith(github.event.head_commit.message, 'release:')
        run: |
          sudo apt-get install -y tcc
          cd compiler
          SALAM="$GITHUB_WORKSPACE/salam" sh tools/bash/run-tests.sh 2>&1 | tee /tmp/tests.log
          grep -qE 'RESULT: [0-9]+ passed, 0 failed' /tmp/tests.log \
            || { echo "::error::Linux test suite failed - blocking release"; exit 1; }
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-linux"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          zip -r "salam-${VERSION}-linux.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-linux.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-zip
          path: salam-*-linux.zip
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux
          path: salam
  build-macos:
    name: Build Salam for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Homebrew downloads
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-dl-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: |
            brew-dl-${{ runner.arch }}-
      - name: Install dependencies (static LLVM)
        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
          HOMEBREW_NO_INSTALL_CLEANUP: '1'
        run: |
          brew install llvm@18 ccache
          "$(brew --prefix llvm@18)/bin/llvm-config" --version
      - name: Cache ccache (macOS)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.ccache
          key: ccache-macos-${{ github.run_id }}
          restore-keys: |
            ccache-macos-
      - name: Build salam for macOS (embedded static LLVM)
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=500M >/dev/null 2>&1 || true
          LLVM_PREFIX="$(brew --prefix llvm@18)"
          make -C compiler -j"$(sysctl -n hw.ncpu)" \
            WITH_LLVM=1 LLVM_LINK_STATIC=1 \
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config" CC="ccache clang" \
            LLVM_CXXLIB=-lc++ \
            EXTRA_LDFLAGS="-L$(brew --prefix)/lib"
          ccache --show-stats 2>/dev/null | head -5 || true
          ./salam version
      - name: Smoke-test the embedded LLVM backend
        run: |
          printf 'func main:\n    __ "ok-llvm"\nend\n' > smoke.salam
          ./salam llvm smoke.salam --jit --log-level=warn
          ./salam llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
          ./salam llvm smoke.salam --exec -o smoke_exe --log-level=warn && ./smoke_exe
          rm -f smoke.salam smoke_exe smoke.o salam_mod_*.c salam_mod_*.h
      - name: Validate test suite (release gate)
        if: startsWith(github.event.head_commit.message, 'release:')
        run: |
          cd compiler
          SALAM="$GITHUB_WORKSPACE/salam" sh tools/bash/run-tests.sh exec errors layout llvm 2>&1 | tee /tmp/tests.log
          grep -qE 'RESULT: [0-9]+ passed, 0 failed' /tmp/tests.log \
            || { echo "::error::macOS test suite failed - blocking release"; exit 1; }
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-mac"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          zip -r "salam-${VERSION}-mac.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-mac.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-macos-zip
          path: salam-*-mac.zip
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-macos
          path: salam
  build-windows:
    name: Build Salam for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache MSYS2 packages
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-mingw64-pkgs-${{ github.run_id }}
          restore-keys: |
            msys2-mingw64-pkgs-

      - name: Install MINGW64 toolchain + static LLVM
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
        run: |
          pacman -Sy --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-llvm \
            make ccache
          gcc --version | head -1
          llvm-config --version

      - name: Cache ccache (Windows)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\ccache-win64
          key: ccache-win64-${{ github.run_id }}
          restore-keys: |
            ccache-win64-

      - name: Build salam.exe with embedded LLVM (static)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
          CCACHE_DIR: 'C:/ccache-win64'
        run: |
          ccache --max-size=500M >/dev/null 2>&1 || true
          make -C compiler -j2 \
            WITH_LLVM=1 LLVM_LINK_STATIC=1 LLVM_CONFIG=llvm-config CC="ccache gcc" \
            EXTRA_LDFLAGS="-static -static-libgcc -static-libstdc++"
          ccache --show-stats 2>/dev/null | head -5 || true
          test -f salam.exe || mv salam salam.exe
          ./salam.exe version

      - name: Verify salam.exe is self-contained (no third-party DLLs)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
        run: |
          echo "DLL imports of salam.exe:"
          objdump -p salam.exe | grep -i 'DLL Name' || true
          bad=$(objdump -p salam.exe | grep -i 'DLL Name' \
            | grep -iE 'libzstd|libstdc\+\+|libgcc|libwinpthread|libxml2|libz\.dll|zlib|libz3|libffi|libLLVM|libc\+\+' \
            || true)
          if [ -n "$bad" ]; then
            echo "ERROR: salam.exe depends on non-system DLLs:"
            echo "$bad"
            exit 1
          fi
          echo "OK: salam.exe imports only Windows system DLLs."

      - name: Stage self-contained bundle
        shell: bash
        run: |
          set -eu
          DIST="salam-windows"
          mkdir -p "$DIST"
          cp salam.exe "$DIST/"
          cp -r compiler/std    "$DIST/std"
          curl -fsSL -o tcc.zip \
            https://download.savannah.gnu.org/releases/tinycc/tcc-0.9.27-win64-bin.zip
          7z x tcc.zip -o"$DIST" >/dev/null
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Windows - self-contained."
            echo ""
            echo "No installation needed. From this folder:"
            echo ""
            echo "  salam.exe version"
            echo "  salam.exe exec  myprogram.salam              (tree-walking interpreter)"
            echo "  salam.exe build myprogram.salam              (C backend via bundled tcc)"
            echo "  salam.exe llvm  myprogram.salam --jit        (run via the built-in LLVM)"
            echo "  salam.exe llvm  myprogram.salam --exec       (native exe via built-in LLVM)"
            echo ""
            echo "LLVM is compiled into salam.exe itself - no clang/llc/lli needed."
            echo "salam.exe finds its std/ library and the bundled tcc/ automatically;"
            echo "keep them next to salam.exe."
          } > "$DIST/RUN-ME.txt"
          echo "bundle contents:"; ls -la "$DIST"

      - name: Smoke-test the embedded LLVM backend
        shell: bash
        run: |
          set -e
          cd salam-windows
          printf 'func main:\n    __ "ok-llvm"\nend\n' > smoke.salam
          echo "[1] LLVM JIT (in-process ORC, no external tools)"
          ./salam.exe llvm smoke.salam --jit --log-level=warn
          echo "[2] LLVM emit-obj (in-process)"
          ./salam.exe llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
          ls -l smoke.o
          echo "[3] C backend via bundled tcc"
          ./salam.exe build smoke.salam --output=smoke_tcc.exe --log-level=warn
          ./smoke_tcc.exe
          echo "[4] LLVM --exec (best-effort: tcc cannot link LLVM COFF objects)"
          if ./salam.exe llvm smoke.salam --exec -o smoke_llvm.exe --log-level=warn \
               && ./smoke_llvm.exe; then
            echo "    llvm --exec OK"
          else
            echo "    note: llvm --exec unavailable on Windows (no LLVM-capable linker);"
            echo "          use 'salam llvm --jit' to run, or 'salam build' for a native exe."
          fi
          rm -f smoke.salam smoke*.exe smoke.o salam_mod_*.c salam_mod_*.h
          cd ..

      - name: Validate test suite (release gate)
        if: startsWith(github.event.head_commit.message, 'release:')
        shell: bash
        run: |
          cd compiler
          SALAM="$GITHUB_WORKSPACE/salam-windows/salam.exe" \
            sh tools/bash/run-tests.sh general exec errors layout llvm 2>&1 | tee /tmp/tests.log
          grep -qE 'RESULT: [0-9]+ passed, 0 failed' /tmp/tests.log \
            || { echo "::error::Windows test suite failed - blocking release"; exit 1; }

      - name: Zip the bundle
        shell: bash
        run: |
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          7z a -tzip "salam-${VERSION}-windows.zip" salam-windows >/dev/null
          ls -la "salam-${VERSION}-windows.zip"

      - name: Upload self-contained bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-bundle
          path: salam-*-windows.zip

      - name: Upload salam.exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows
          path: salam.exe

  build-windows-i686:
    name: Build Salam for Windows (32-bit / i686)
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 330
    env:
      LLVM_VER: '18.1.8'
      LLVM_PREFIX: 'C:/llvm-i686'
      CACHE_REV: 'v1'
      CCACHE_DIR: 'C:/ccache-i686'
      CCACHE_MAXSIZE: '2G'
      CCACHE_COMPRESS: '1'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache MSYS2 package downloads (mingw32)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-mingw32-pkgs-${{ github.run_id }}
          restore-keys: |
            msys2-mingw32-pkgs-

      - name: Cache MSYS2 mingw32 toolchain tree
        id: toolcache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\msys64\mingw32
          key: msys2-mingw32-tree-${{ env.CACHE_REV }}

      - name: Install toolchain (only what the cache is missing)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
        run: |
          pacman -Sy --noconfirm --needed make tar xz ccache \
            || pacman -Sy --noconfirm --needed make tar xz || true
          if ! command -v gcc >/dev/null 2>&1; then
            echo "mingw32 toolchain cache miss - installing gcc + build tools"
            pacman -S --noconfirm --needed \
              mingw-w64-i686-gcc mingw-w64-i686-cmake \
              mingw-w64-i686-ninja mingw-w64-i686-python \
              || pacman -S --noconfirm --needed mingw-w64-i686-gcc cmake ninja python || true
          else
            echo "mingw32 toolchain restored from cache - skipping pacman install"
          fi
          gcc --version | head -1
          gcc -dumpmachine
          cmake --version | head -1 || true
          ninja --version || true
          ccache --version | head -1 || true

      - name: Restore prebuilt i686 LLVM
        id: llvmcache
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\llvm-i686
          key: llvm-i686-${{ env.LLVM_VER }}-x86-minsizerel-${{ env.CACHE_REV }}

      - name: Restore ccache (i686 LLVM objects)
        id: ccacherestore
        if: steps.llvmcache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\ccache-i686
          key: ccache-i686-llvm-${{ env.LLVM_VER }}-${{ env.CACHE_REV }}-${{ github.run_id }}
          restore-keys: |
            ccache-i686-llvm-${{ env.LLVM_VER }}-${{ env.CACHE_REV }}-
            ccache-i686-llvm-${{ env.LLVM_VER }}-

      - name: Build LLVM ${{ env.LLVM_VER }} from source for i686 (X86 only)
        id: llvmbuild
        if: steps.llvmcache.outputs.cache-hit != 'true'
        continue-on-error: true
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
        run: |
          set -e
          command -v cmake >/dev/null && command -v ninja >/dev/null || {
            echo "cmake/ninja unavailable for i686; skipping LLVM build."; exit 1; }
          CCACHE_FLAGS=""
          if command -v ccache >/dev/null; then
            ccache --max-size="${CCACHE_MAXSIZE}" >/dev/null 2>&1 || true
            ccache --zero-stats >/dev/null 2>&1 || true
            CCACHE_FLAGS="-DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache"
          fi
          src="llvm-project-${LLVM_VER}.src"
          curl -fsSL -o llvm.tar.xz \
            "https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VER}/${src}.tar.xz"
          tar -xf llvm.tar.xz
          cmake -S "${src}/llvm" -B llvm-build -G Ninja \
            $CCACHE_FLAGS \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_INSTALL_PREFIX="${LLVM_PREFIX}" \
            -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ \
            -DLLVM_TARGETS_TO_BUILD=X86 \
            -DLLVM_ENABLE_PROJECTS='' -DLLVM_ENABLE_RUNTIMES='' \
            -DLLVM_ENABLE_ZLIB=OFF -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBEDIT=OFF -DLLVM_ENABLE_Z3_SOLVER=OFF \
            -DLLVM_ENABLE_LIBPFM=OFF -DLLVM_ENABLE_PLUGINS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_BUILD_TOOLS=OFF -DLLVM_BUILD_UTILS=OFF \
            -DLLVM_BUILD_RUNTIME=OFF -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_PARALLEL_LINK_JOBS=1
          ninja -C llvm-build
          ninja -C llvm-build llvm-config
          ninja -C llvm-build install
          mkdir -p "${LLVM_PREFIX}/bin"
          ninja -C llvm-build install-llvm-config 2>/dev/null \
            || cp -f llvm-build/bin/llvm-config.exe "${LLVM_PREFIX}/bin/" 2>/dev/null || true
          "${LLVM_PREFIX}/bin/llvm-config" --version
          "${LLVM_PREFIX}/bin/llvm-config" --libdir
          command -v ccache >/dev/null && ccache --show-stats || true
          libdir="$("${LLVM_PREFIX}/bin/llvm-config" --libdir)"
          nlibs=$(ls "$libdir"/libLLVM*.a 2>/dev/null | wc -l)
          echo "Installed $nlibs LLVM static libraries in $libdir"
          [ "$nlibs" -ge 1 ] || { echo "ERROR: no LLVM static libs installed"; exit 1; }
          rm -rf llvm-build "llvm-project-${LLVM_VER}.src" llvm.tar.xz || true
          df -h / 2>/dev/null | tail -1 || true
          echo "llvm_built=1" >> "$GITHUB_OUTPUT"

      - name: Save ccache (i686 LLVM objects)
        if: steps.llvmcache.outputs.cache-hit != 'true' && steps.llvmbuild.outcome == 'success'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\ccache-i686
          key: ccache-i686-llvm-${{ env.LLVM_VER }}-${{ env.CACHE_REV }}-${{ github.run_id }}

      - name: Save prebuilt i686 LLVM
        if: steps.llvmcache.outputs.cache-hit != 'true' && steps.llvmbuild.outputs.llvm_built == '1'
        uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: C:\llvm-i686
          key: llvm-i686-${{ env.LLVM_VER }}-x86-minsizerel-${{ env.CACHE_REV }}

      - name: Build 32-bit salam.exe (embedded LLVM if available, else C backend)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
        run: |
          LC="${LLVM_PREFIX}/bin/llvm-config"
          built=0
          if [ -x "$LC" ] || [ -x "$LC.exe" ]; then
            echo "Found i686 llvm-config; attempting embedded static LLVM link."
            if make -C compiler -j2 \
                 WITH_LLVM=1 LLVM_LINK_STATIC=1 LLVM_CONFIG="$LC" CC=gcc \
                 LLVM_ZSTD_LIB= \
                 EXTRA_LDFLAGS="-static -static-libgcc -static-libstdc++ -Wl,--no-keep-memory -Wl,--reduce-memory-overheads"; then
              built=1
              echo "HAS_LLVM=1" >> "$GITHUB_ENV"
              echo "Embedded LLVM build succeeded."
            else
              echo "32-bit static LLVM link failed (likely address-space limit); using C backend."
              make -C compiler clean
            fi
          else
            echo "No i686 LLVM available; building C backend only."
          fi
          if [ "$built" != "1" ]; then
            make -C compiler -j2 WITH_LLVM=0 CC=gcc \
              EXTRA_LDFLAGS="-static -static-libgcc"
            echo "HAS_LLVM=0" >> "$GITHUB_ENV"
          fi
          test -f salam.exe || mv salam salam.exe
          ./salam.exe version
          file salam.exe || true

      - name: Verify salam.exe is self-contained (no third-party DLLs)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
        run: |
          echo "DLL imports of salam.exe:"
          objdump -p salam.exe | grep -i 'DLL Name' || true
          bad=$(objdump -p salam.exe | grep -i 'DLL Name' \
            | grep -iE 'libzstd|libstdc\+\+|libgcc|libwinpthread|libxml2|libz\.dll|zlib|libz3|libffi|libLLVM|libc\+\+' \
            || true)
          if [ -n "$bad" ]; then
            echo "ERROR: salam.exe depends on non-system DLLs:"
            echo "$bad"
            exit 1
          fi
          echo "OK: salam.exe imports only Windows system DLLs."

      - name: Stage self-contained 32-bit bundle
        shell: bash
        run: |
          set -eu
          DIST="salam-windows-i686"
          mkdir -p "$DIST"
          cp salam.exe "$DIST/"
          cp -r compiler/std    "$DIST/std"
          curl -fsSL -o tcc.zip \
            https://download.savannah.gnu.org/releases/tinycc/tcc-0.9.27-win32-bin.zip
          7z x tcc.zip -o"$DIST" >/dev/null
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Windows (32-bit / i686) - self-contained."
            echo ""
            echo "Runs on 32-bit and 64-bit Windows. From this folder:"
            echo ""
            echo "  salam.exe version"
            echo "  salam.exe exec  myprogram.salam              (tree-walking interpreter)"
            echo "  salam.exe build myprogram.salam              (C backend via bundled 32-bit tcc)"
            if [ "${HAS_LLVM:-0}" = "1" ]; then
              echo "  salam.exe llvm  myprogram.salam --jit        (run via the built-in LLVM)"
              echo ""
              echo "LLVM is compiled into salam.exe itself - no clang/llc/lli needed."
            else
              echo ""
              echo "Note: this 32-bit build ships the interpreter and the C backend"
              echo "(bundled tcc) only - the embedded LLVM backend could not be built"
              echo "for 32-bit. Use the 64-bit Windows build if you need 'salam llvm'."
            fi
          } > "$DIST/RUN-ME.txt"
          echo "bundle contents:"; ls -la "$DIST"

      - name: Smoke-test the 32-bit build
        shell: bash
        run: |
          set -e
          cd salam-windows-i686
          printf 'func main:\n    __ "ok-win32"\nend\n' > smoke.salam
          if [ "${HAS_LLVM:-0}" = "1" ]; then
            echo "[1] LLVM JIT (in-process, 32-bit)"
            ./salam.exe llvm smoke.salam --jit --log-level=warn
            echo "[2] LLVM emit-obj (32-bit object)"
            ./salam.exe llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
            file smoke.o || true
          else
            echo "note: this 32-bit build ships the C backend only (no embedded LLVM)."
          fi
          echo "[3] C backend via bundled 32-bit tcc"
          ./salam.exe build smoke.salam --output=smoke_tcc.exe --log-level=warn
          ./smoke_tcc.exe
          echo "[4] interpreter"
          ./salam.exe exec smoke.salam --log-level=warn
          rm -f smoke.salam smoke*.exe smoke.o salam_mod_*.c salam_mod_*.h
          cd ..

      - name: Zip the 32-bit bundle
        shell: bash
        run: |
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          7z a -tzip "salam-${VERSION}-windows-i686.zip" salam-windows-i686 >/dev/null
          ls -la "salam-${VERSION}-windows-i686.zip"

      - name: Upload 32-bit Windows bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-i686-bundle
          path: salam-*-windows-i686.zip

      - name: Upload 32-bit salam.exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-i686
          path: salam.exe

  build-linux-i686:
    name: Build Salam for Linux (32-bit / i686)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install 32-bit toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386 ccache
          gcc -m32 --version | head -1
      - name: Cache ccache (Linux i686)
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.ccache
          key: ccache-linux-i686-${{ github.run_id }}
          restore-keys: |
            ccache-linux-i686-
      - name: Build 32-bit salam (C backend)
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=300M >/dev/null 2>&1 || true
          make -C compiler -j"$(nproc)" CC="ccache gcc -m32"
          ccache --show-stats 2>/dev/null | head -5 || true
          file salam
          ./salam version
      - name: Smoke-test the 32-bit binary
        run: |
          printf 'func main:\n    __ "ok-linux-32"\nend\n' > smoke.salam
          ./salam build smoke.salam --output=smoke --log-level=warn && ./smoke
          ./salam exec smoke.salam --log-level=warn || true
          rm -f smoke smoke.salam salam_mod_*.c salam_mod_*.h
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-linux-i686"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          zip -r "salam-${VERSION}-linux-i686.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-linux-i686.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-i686-zip
          path: salam-*-linux-i686.zip
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-i686
          path: salam

  build-linux-arm:
    name: Build Salam for Linux ARM (${{ matrix.arch }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            pkg: gcc-aarch64-linux-gnu
            qemu: qemu-aarch64-static
            sysroot: /usr/aarch64-linux-gnu
          - arch: armhf
            cc: arm-linux-gnueabihf-gcc
            pkg: gcc-arm-linux-gnueabihf
            qemu: qemu-arm-static
            sysroot: /usr/arm-linux-gnueabihf
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cross toolchain + qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }} qemu-user-static ccache
          ${{ matrix.cc }} --version | head -1
      - name: Cache ccache (${{ matrix.arch }})
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.ccache
          key: ccache-linux-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: |
            ccache-linux-${{ matrix.arch }}-
      - name: Cross-build salam for ${{ matrix.arch }}
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=300M >/dev/null 2>&1 || true
          make -C compiler -j"$(nproc)" CC="ccache ${{ matrix.cc }}"
          ccache --show-stats 2>/dev/null | head -5 || true
          file salam
      - name: Smoke-test under qemu
        run: |
          ${{ matrix.qemu }} -L ${{ matrix.sysroot }} ./salam version
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-linux-${{ matrix.arch }}"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          zip -r "salam-${VERSION}-linux-${{ matrix.arch }}.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-linux-${{ matrix.arch }}.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-${{ matrix.arch }}-zip
          path: salam-*-linux-${{ matrix.arch }}.zip
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-${{ matrix.arch }}
          path: salam

  create-release:
    if: |
      startsWith(github.event.head_commit.message, 'release:') &&
      github.repository == 'SalamLang/Salam'
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows,
            build-windows-i686, build-linux-i686, build-linux-arm]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read version from VERSION file
        id: get_version
        run: |
          VERSION=$(cat VERSION | sed 's/^[ \t]*//;s/[ \t]*$//')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "Salam version: ${VERSION}"
      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux
          path: ./release
      - name: Rename Linux binary to avoid conflict
        run: |
          mv ./release/salam ./release/salam-linux
      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-macos
          path: ./release
      - name: Rename macOS binary to avoid conflict
        run: |
          mv ./release/salam ./release/salam-mac
      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows
          path: ./release
      - name: Rename Window binary
        run: |
          mv ./release/salam.exe ./release/salam-windows.exe
      - name: Download Windows self-contained bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-bundle
          path: ./release
      - name: Download Linux versioned archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-zip
          path: ./release
      - name: Download macOS versioned archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-macos-zip
          path: ./release
      - name: Download Windows i686 binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-i686
          path: ./release-win-i686
      - name: Download Windows i686 bundle
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-i686-bundle
          path: ./release
      - name: Download Linux i686 binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-i686
          path: ./release-linux-i686
      - name: Download Linux i686 archive
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-i686-zip
          path: ./release
      - name: Download Linux aarch64 binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-aarch64
          path: ./release-linux-aarch64
      - name: Download Linux aarch64 archive
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-aarch64-zip
          path: ./release
      - name: Download Linux armhf binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-armhf
          path: ./release-linux-armhf
      - name: Download Linux armhf archive
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-armhf-zip
          path: ./release
      - name: Collect 32-bit / cross binaries (rename to avoid name clashes)
        run: |
          set -eu
          [ -f ./release-win-i686/salam.exe ]     && mv ./release-win-i686/salam.exe     ./release/salam-windows-i686.exe || true
          [ -f ./release-linux-i686/salam ]       && mv ./release-linux-i686/salam       ./release/salam-linux-i686       || true
          [ -f ./release-linux-aarch64/salam ]    && mv ./release-linux-aarch64/salam    ./release/salam-linux-aarch64    || true
          [ -f ./release-linux-armhf/salam ]      && mv ./release-linux-armhf/salam      ./release/salam-linux-armhf      || true
          echo "release/ now contains:"; ls -la ./release
      # - name: Post Linux release file to SERVER_VERSIONS_API
      #   env:
      #     SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
      #     SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
      #   run: |
      #     curl -X POST "$SERVER_VERSIONS_API" \
      #       -F "file=@./release/salam-linux" \
      #       -F "version=${{ env.VERSION }}" \
      #       -F "date=$(date +'%Y-%m-%d')" \
      #       -F "time=$(date +'%H:%M:%S')" \
      #       -F "key='$SERVER_VERSIONS_KEY'" \
      #       -F "platform=linux"
      # - name: Post macOS release file to SERVER_VERSIONS_API
      #   env:
      #     SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
      #     SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
      #   run: |
      #     curl -X POST "$SERVER_VERSIONS_API" \
      #       -F "file=@./release/salam-mac" \
      #       -F "version=${{ env.VERSION }}" \
      #       -F "date=$(date +'%Y-%m-%d')" \
      #       -F "time=$(date +'%H:%M:%S')" \
      #       -F "key='$SERVER_VERSIONS_KEY'" \
      #       -F "platform=macos"
      # - name: Post Windows release file to SERVER_VERSIONS_API
      #   env:
      #     SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
      #     SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
      #   run: |
      #     curl -X POST "$SERVER_VERSIONS_API" \
      #       -F "file=@./release/salam-windows.exe" \
      #       -F "version=${{ env.VERSION }}" \
      #       -F "date=$(date +'%Y-%m-%d')" \
      #       -F "time=$(date +'%H:%M:%S')" \
      #       -F "key='$SERVER_VERSIONS_KEY'" \
      #       -F "platform=windows"
      - name: Delete existing release and tag if found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION }}"
          if gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null; then
            echo "Deleted existing release $TAG (and its tag)."
          else
            echo "No existing release $TAG."
          fi
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          shopt -s nullglob
          candidates=(
            # release/salam-linux
            # release/salam-mac
            # release/salam-windows.exe
            # release/salam-linux-i686
            # release/salam-windows-i686.exe
            # release/salam-linux-aarch64
            # release/salam-linux-armhf
            release/salam-*.zip
          )
          assets=()
          for c in "${candidates[@]}"; do
            for f in $c; do [ -e "$f" ] && assets+=("$f"); done
          done
          echo "Publishing ${#assets[@]} assets:"; printf '  %s\n' "${assets[@]}"
          gh release create "v${{ env.VERSION }}" \
            --target "$GITHUB_SHA" \
            --title "Salam Release v${{ env.VERSION }}" \
            --generate-notes \
            "${assets[@]}"
