---
name: 🚀 Compiler - Build & Release Binaries
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build-linux:
    name: Build Salam for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies (static LLVM + LLD + cross sysroot inputs)
        run: |
          # LLVM 22 is not in the Ubuntu default repos yet; add apt.llvm.org.
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get update
          sudo apt-get install -y build-essential ccache \
            llvm-22-dev liblld-22-dev libpolly-22-dev libclang-rt-22-dev \
            libzstd-dev zlib1g-dev libtinfo-dev libxml2-dev \
            musl-dev musl-tools mingw-w64 qemu-user-static
          gcc --version | head -1
          llvm-config-22 --version
      - name: Fetch cross musl sysroots (aarch64 + i686) for embedding
        run: |
          # Prebuilt musl.cc toolchains (MIT). We embed each arch's static link
          # inputs (crt*.o + libc.a + libgcc.a; libgcc supplies the soft-float
          # long-double builtins musl's printf needs) so the x86_64 flagship can
          # cross-link static-musl ELF for aarch64/i686 with nothing installed.
          # Best-effort per arch: if musl.cc is unreachable, that arch is simply
          # not embedded and the flagship still targets x86_64 + Windows.
          fetch() {
            for a in 1 2 3 4 5; do
              curl -fL --connect-timeout 20 --retry 3 --retry-delay 5 -o "$2" "$1" && return 0
              sleep $((a * 5))
            done
            return 1
          }
          mkdir -p /tmp/muslcc && cd /tmp/muslcc
          for arch in aarch64 i686; do
            if fetch "https://musl.cc/${arch}-linux-musl-cross.tgz" "${arch}.tgz" \
                 && tar xzf "${arch}.tgz"; then
              SR="/tmp/muslcc/sr-${arch}"; mkdir -p "$SR"
              cp "${arch}-linux-musl-cross/${arch}-linux-musl/lib/"{crt1.o,crti.o,crtn.o,libc.a} "$SR/"
              cp "$(ls ${arch}-linux-musl-cross/lib/gcc/${arch}-linux-musl/*/libgcc.a | head -1)" "$SR/libgcc.a"
              U=$(echo "$arch" | tr '[:lower:]' '[:upper:]')
              echo "SALAM_EMBED_MUSL_${U}_DIR=$SR" >> "$GITHUB_ENV"
              echo "staged $arch musl sysroot -> $SR"; ls "$SR"
            else
              echo "::warning::could not fetch musl.cc $arch toolchain; not embedding $arch."
            fi
          done
      - name: Cache ccache (Linux)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.ccache
          key: ccache-linux-${{ github.run_id }}
          restore-keys: |
            ccache-linux-
      - name: Build the flagship self-contained salam (LLVM + LLD + sysroots)
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=800M >/dev/null 2>&1 || true
          # Per-arch musl sysroots (may be empty if musl.cc was unreachable; an
          # empty *_DIR just means that arch is not embedded).
          if make -C compiler self-contained -j"$(nproc)" \
               CC="ccache gcc" CXX="ccache g++" LLVM_CONFIG=llvm-config-22 \
               SALAM_EMBED_MUSL_AARCH64_DIR="${SALAM_EMBED_MUSL_AARCH64_DIR:-}" \
               SALAM_EMBED_MUSL_I686_DIR="${SALAM_EMBED_MUSL_I686_DIR:-}"; then
            echo "SELF_CONTAINED=1" >> "$GITHUB_ENV"
            echo "Built flagship self-contained salam."
          else
            echo "::warning::self-contained (LLD) build failed; falling back to embedded-LLVM-only."
            make -C compiler clean
            make -C compiler -j"$(nproc)" \
              WITH_LLVM=1 LLVM_LINK_STATIC=1 LLVM_CONFIG=llvm-config-22 CC="ccache gcc" \
              EXTRA_LDFLAGS="-static-libgcc -static-libstdc++"
            echo "SELF_CONTAINED=0" >> "$GITHUB_ENV"
          fi
          ccache --show-stats 2>/dev/null | head -5 || true
          ./salam version
      - name: Smoke-test the backend (and cross-compile with a scrubbed PATH)
        run: |
          export SALAM_STD="$PWD/compiler/std"
          printf 'func main:\n    __ "ok-llvm"\nend\n' > smoke.salam
          echo "[native] embedded LLVM backend"
          ./salam llvm smoke.salam --jit --log-level=warn
          ./salam llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
          ./salam llvm smoke.salam --exec -o smoke_exe --log-level=warn && ./smoke_exe
          if [ "${SELF_CONTAINED:-0}" = "1" ]; then
            echo "[cross] x86_64-linux-musl, PATH=/nonexistent (in-process LLD + embedded musl)"
            env PATH=/nonexistent SALAM_STD="$SALAM_STD" SALAM_CACHE=/tmp/sc \
              ./salam build smoke.salam --target=x86_64-linux-musl -o smoke_musl
            ./smoke_musl; file smoke_musl
            echo "[cross] x86_64-w64-windows-gnu, PATH=/nonexistent (embedded mingw sysroot)"
            env PATH=/nonexistent SALAM_STD="$SALAM_STD" SALAM_CACHE=/tmp/sc \
              ./salam build smoke.salam --target=x86_64-w64-windows-gnu -o smoke.exe
            file smoke.exe
            if [ -n "${SALAM_EMBED_MUSL_AARCH64_DIR:-}" ]; then
              echo "[cross] aarch64-linux-musl, PATH=/nonexistent (embedded aarch64 musl)"
              env PATH=/nonexistent SALAM_STD="$SALAM_STD" SALAM_CACHE=/tmp/sc \
                ./salam build smoke.salam --target=aarch64-linux-musl -o smoke_a64
              file smoke_a64
              qemu-aarch64-static ./smoke_a64
            fi
            if [ -n "${SALAM_EMBED_MUSL_I686_DIR:-}" ]; then
              echo "[cross] i686-linux-musl, PATH=/nonexistent (embedded i686 musl)"
              env PATH=/nonexistent SALAM_STD="$SALAM_STD" SALAM_CACHE=/tmp/sc \
                ./salam build smoke.salam --target=i686-linux-musl -o smoke_i686
              file smoke_i686
              ./smoke_i686
            fi
          fi
          rm -f smoke.salam smoke_exe smoke_musl smoke.exe smoke_a64 smoke_i686 smoke.o salam_mod_*.c salam_mod_*.h
      - name: Validate full test suite (release gate)
        if: startsWith(github.event.head_commit.message, 'release:')
        run: |
          sudo apt-get install -y tcc
          cd compiler
          SALAM="$GITHUB_WORKSPACE/salam" sh tools/bash/run-tests.sh 2>&1 | tee /tmp/tests.log || true
          grep -qE 'RESULT: [0-9]+ passed, 0 failed' /tmp/tests.log \
            || { echo "::error::Linux test suite failed - blocking release"; exit 1; }
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-linux"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Linux (x86_64) - flagship self-contained toolchain."
            echo ""
            echo "No installation needed. From this folder:"
            echo ""
            echo "  ./salam version"
            echo "  ./salam exec  app.salam                               (interpreter)"
            echo "  ./salam llvm  app.salam --jit                         (run via built-in LLVM)"
            echo "  ./salam build app.salam -o app                        (native binary)"
            if [ "${SELF_CONTAINED:-0}" = "1" ]; then
              echo ""
              echo "Cross-compile with ZERO tools installed (LLVM + LLD + sysroots are"
              echo "compiled into salam itself):"
              echo ""
              echo "  ./salam build app.salam --target=x86_64-linux-musl      -o app"
              echo "  ./salam build app.salam --target=x86_64-w64-windows-gnu -o app.exe"
              if [ -n "${SALAM_EMBED_MUSL_AARCH64_DIR:-}" ]; then
                echo "  ./salam build app.salam --target=aarch64-linux-musl     -o app"
              fi
              if [ -n "${SALAM_EMBED_MUSL_I686_DIR:-}" ]; then
                echo "  ./salam build app.salam --target=i686-linux-musl        -o app"
              fi
              echo ""
              echo "Embedded targets depend on which sysroots this build bundled (see"
              echo "above). Other targets link against a system or \$SALAM_SYSROOTS"
              echo "sysroot. macOS targets are not supported (Apple SDK restrictions)."
            fi
          } > "$DIST/RUN-ME.txt"
          zip -r "salam-${VERSION}-linux.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-linux.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-zip
          path: salam-*-linux.zip
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux
          path: salam
  build-macos:
    name: Build Salam for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Homebrew downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-dl-${{ runner.arch }}-${{ github.run_id }}
          restore-keys: |
            brew-dl-${{ runner.arch }}-
      - name: Install dependencies (static LLVM)
        env:
          HOMEBREW_NO_AUTO_UPDATE: '1'
          HOMEBREW_NO_INSTALL_CLEANUP: '1'
        run: |
          brew install llvm@22 ccache
          "$(brew --prefix llvm@22)/bin/llvm-config" --version
      - name: Cache ccache (macOS)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.ccache
          key: ccache-macos-${{ github.run_id }}
          restore-keys: |
            ccache-macos-
      - name: Build salam for macOS (embedded static LLVM)
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=500M >/dev/null 2>&1 || true
          LLVM_PREFIX="$(brew --prefix llvm@22)"
          make -C compiler -j"$(sysctl -n hw.ncpu)" \
            WITH_LLVM=1 LLVM_LINK_STATIC=1 \
            LLVM_CONFIG="$LLVM_PREFIX/bin/llvm-config" CC="ccache clang" \
            LLVM_CXXLIB=-lc++ \
            EXTRA_LDFLAGS="-L$(brew --prefix)/lib"
          ccache --show-stats 2>/dev/null | head -5 || true
          ./salam version
      - name: Smoke-test the embedded LLVM backend
        run: |
          export SALAM_STD="$PWD/compiler/std"
          printf 'func main:\n    __ "ok-llvm"\nend\n' > smoke.salam
          ./salam llvm smoke.salam --jit --log-level=warn
          ./salam llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
          ./salam llvm smoke.salam --exec -o smoke_exe --log-level=warn && ./smoke_exe
          rm -f smoke.salam smoke_exe smoke.o salam_mod_*.c salam_mod_*.h
      - name: Validate test suite (release gate)
        if: startsWith(github.event.head_commit.message, 'release:')
        run: |
          cd compiler
          SALAM="$GITHUB_WORKSPACE/salam" sh tools/bash/run-tests.sh exec errors layout llvm 2>&1 | tee /tmp/tests.log || true
          grep -qE 'RESULT: [0-9]+ passed, 0 failed' /tmp/tests.log \
            || { echo "::error::macOS test suite failed - blocking release"; exit 1; }
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-mac"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for macOS - embedded LLVM toolchain."
            echo ""
            echo "  ./salam exec  app.salam            (interpreter)"
            echo "  ./salam llvm  app.salam --jit      (run via built-in LLVM)"
            echo "  ./salam build app.salam -o app     (native binary; uses the system"
            echo "                                      clang/ld that ship with Xcode CLT)"
            echo ""
            echo "Note: macOS cannot be a fully-static, self-contained cross-compiler."
            echo "Apple does not permit statically linking libSystem and the macOS SDK"
            echo "is not redistributable, so linking uses Apple's toolchain. Cross-"
            echo "compiling FROM Linux/Windows TO macOS is likewise not supported."
          } > "$DIST/RUN-ME.txt"
          zip -r "salam-${VERSION}-mac.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-mac.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-macos-zip
          path: salam-*-mac.zip
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-macos
          path: salam
  build-windows:
    name: Build Salam for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache MSYS2 packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-mingw64-pkgs-${{ github.run_id }}
          restore-keys: |
            msys2-mingw64-pkgs-

      - name: Install MINGW64 toolchain + static LLVM + LLD
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
        run: |
          pacman -Sy --noconfirm --needed \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-llvm \
            mingw-w64-x86_64-lld \
            make ccache
          gcc --version | head -1
          llvm-config --version

      - name: Cache ccache (Windows)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\ccache-win64
          key: ccache-win64-${{ github.run_id }}
          restore-keys: |
            ccache-win64-

      - name: Build salam.exe (embedded LLVM; best-effort LLD + mingw sysroot)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
          CCACHE_DIR: 'C:/ccache-win64'
        run: |
          ccache --max-size=500M >/dev/null 2>&1 || true
          # Assemble a mingw sysroot to embed so a cross-build to
          # x86_64-w64-windows-gnu needs no files beside salam.exe. Best-effort:
          # if the in-process LLD link fails, fall back to embedded-LLVM + tcc.
          SR=/tmp/mingw-sr/lib; mkdir -p "$SR"
          MR=/mingw64/x86_64-w64-mingw32/lib
          GR=$(ls -d /mingw64/lib/gcc/x86_64-w64-mingw32/* 2>/dev/null | head -1)
          embed_ok=1
          for x in crt2.o dllcrt2.o libmingw32.a libmingwex.a libmoldname.a \
                   libmsvcrt.a libadvapi32.a libshell32.a libuser32.a libkernel32.a; do
            cp "$MR/$x" "$SR/" 2>/dev/null || embed_ok=0
          done
          for x in crtbegin.o crtend.o libgcc.a libgcc_eh.a; do
            cp "$GR/$x" "$SR/" 2>/dev/null || embed_ok=0
          done
          built=0
          if [ "$embed_ok" = 1 ]; then
            echo "Attempting flagship build (embedded LLVM + in-process LLD + mingw sysroot)."
            if make -C compiler -j2 \
                 WITH_LLVM=1 WITH_LLD=1 LLVM_LINK_STATIC=1 LLVM_CONFIG=llvm-config \
                 CC="ccache gcc" CXX="ccache g++" \
                 SALAM_EMBED_MINGW_DIR=/tmp/mingw-sr \
                 EXTRA_LDFLAGS="-static -static-libgcc -static-libstdc++"; then
              built=1
              echo "SELF_CONTAINED=1" >> "$GITHUB_ENV"
              echo "Flagship self-contained salam.exe built."
            else
              echo "::warning::LLD/embedded-sysroot build failed; falling back to embedded-LLVM-only."
              make -C compiler clean
            fi
          else
            echo "::warning::could not assemble mingw sysroot; building embedded-LLVM-only."
          fi
          if [ "$built" != 1 ]; then
            make -C compiler -j2 \
              WITH_LLVM=1 LLVM_LINK_STATIC=1 LLVM_CONFIG=llvm-config CC="ccache gcc" \
              EXTRA_LDFLAGS="-static -static-libgcc -static-libstdc++"
            echo "SELF_CONTAINED=0" >> "$GITHUB_ENV"
          fi
          ccache --show-stats 2>/dev/null | head -5 || true
          test -f salam.exe || mv salam salam.exe
          ./salam.exe version

      - name: Verify salam.exe is self-contained (no third-party DLLs)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW64
          CHERE_INVOKING: '1'
        run: |
          echo "DLL imports of salam.exe:"
          objdump -p salam.exe | grep -i 'DLL Name' || true
          bad=$(objdump -p salam.exe | grep -i 'DLL Name' \
            | grep -iE 'libzstd|libstdc\+\+|libgcc|libwinpthread|libxml2|libz\.dll|zlib|libz3|libffi|libLLVM|libc\+\+' \
            || true)
          if [ -n "$bad" ]; then
            echo "ERROR: salam.exe depends on non-system DLLs:"
            echo "$bad"
            exit 1
          fi
          echo "OK: salam.exe imports only Windows system DLLs."

      - name: Stage self-contained bundle
        shell: bash
        run: |
          set -eu
          DIST="salam-windows"
          mkdir -p "$DIST"
          cp salam.exe "$DIST/"
          cp -r compiler/std    "$DIST/std"
          fetch_tcc() {
            out="$1"; file="$2"
            for attempt in 1 2 3 4 5; do
              for base in \
                "https://download.savannah.gnu.org/releases/tinycc" \
                "https://download-mirror.savannah.gnu.org/releases/tinycc" \
                "https://download.savannah.nongnu.org/releases/tinycc"; do
                echo "Fetching $base/$file (attempt $attempt)..."
                if curl -fL --connect-timeout 20 --retry 3 --retry-delay 5 \
                     --retry-all-errors -o "$out" "$base/$file"; then
                  return 0
                fi
              done
              sleep $((attempt * 10))
            done
            echo "ERROR: could not download $file from any Savannah mirror" >&2
            return 1
          }
          fetch_tcc tcc.zip tcc-0.9.27-win64-bin.zip
          7z x tcc.zip -o"$DIST" >/dev/null
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Windows - self-contained."
            echo ""
            echo "No installation needed. From this folder:"
            echo ""
            echo "  salam.exe version"
            echo "  salam.exe exec  myprogram.salam              (tree-walking interpreter)"
            echo "  salam.exe build myprogram.salam              (C backend via bundled tcc)"
            echo "  salam.exe llvm  myprogram.salam --jit        (run via the built-in LLVM)"
            echo "  salam.exe llvm  myprogram.salam --exec       (native exe via built-in LLVM)"
            if [ "${SELF_CONTAINED:-0}" = "1" ]; then
              echo ""
              echo "Cross-compile a native Windows exe with ZERO tools installed"
              echo "(LLVM + LLD + a mingw sysroot are compiled into salam.exe):"
              echo ""
              echo "  salam.exe build myprogram.salam --target=x86_64-w64-windows-gnu -o app.exe"
            fi
            echo ""
            echo "LLVM is compiled into salam.exe itself - no clang/llc/lli needed."
            echo "salam.exe finds its std/ library and the bundled tcc/ automatically;"
            echo "keep them next to salam.exe."
          } > "$DIST/RUN-ME.txt"
          echo "bundle contents:"; ls -la "$DIST"

      - name: Smoke-test the embedded LLVM backend
        shell: bash
        run: |
          set -e
          cd salam-windows
          export SALAM_STD="$PWD/std"
          printf 'func main:\n    __ "ok-llvm"\nend\n' > smoke.salam
          echo "[1] LLVM JIT (in-process ORC, no external tools)"
          ./salam.exe llvm smoke.salam --jit --log-level=warn
          echo "[2] LLVM emit-obj (in-process)"
          ./salam.exe llvm smoke.salam --emit-obj -o smoke.o --log-level=warn
          ls -l smoke.o
          echo "[3] C backend via bundled tcc"
          ./salam.exe build smoke.salam --output=smoke_tcc.exe --log-level=warn
          ./smoke_tcc.exe
          echo "[4] LLVM --exec (best-effort: tcc cannot link LLVM COFF objects)"
          if ./salam.exe llvm smoke.salam --exec -o smoke_llvm.exe --log-level=warn \
               && ./smoke_llvm.exe; then
            echo "    llvm --exec OK"
          else
            echo "    note: llvm --exec unavailable on Windows (no LLVM-capable linker);"
            echo "          use 'salam llvm --jit' to run, or 'salam build' for a native exe."
          fi
          rm -f smoke.salam smoke*.exe smoke.o salam_mod_*.c salam_mod_*.h
          cd ..

      - name: Validate test suite (release gate)
        if: startsWith(github.event.head_commit.message, 'release:')
        shell: bash
        run: |
          cd compiler
          SALAM="$GITHUB_WORKSPACE/salam-windows/salam.exe" \
            sh tools/bash/run-tests.sh general exec errors layout llvm 2>&1 | tee /tmp/tests.log || true
          grep -qE 'RESULT: [0-9]+ passed, 0 failed' /tmp/tests.log \
            || { echo "::error::Windows test suite failed - blocking release"; exit 1; }

      - name: Zip the bundle
        shell: bash
        run: |
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          7z a -tzip "salam-${VERSION}-windows.zip" salam-windows >/dev/null
          ls -la "salam-${VERSION}-windows.zip"

      - name: Upload self-contained bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-bundle
          path: salam-*-windows.zip

      - name: Upload salam.exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows
          path: salam.exe

  build-windows-i686:
    name: Build Salam for Windows (32-bit / i686, minimal)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache MSYS2 package downloads (mingw32)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-mingw32-pkgs-${{ github.run_id }}
          restore-keys: |
            msys2-mingw32-pkgs-

      - name: Install MINGW32 toolchain
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
        run: |
          pacman -Sy --noconfirm --needed mingw-w64-i686-gcc make ccache
          gcc --version | head -1
          gcc -dumpmachine

      - name: Cache ccache (Windows i686)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: C:\ccache-i686
          key: ccache-win-i686-${{ github.run_id }}
          restore-keys: |
            ccache-win-i686-

      - name: Build 32-bit salam.exe (C backend, no LLVM by design)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
          CCACHE_DIR: 'C:/ccache-i686'
        run: |
          ccache --max-size=300M >/dev/null 2>&1 || true
          # The 32-bit build intentionally ships the interpreter + C backend
          # (bundled tcc) only. A static 32-bit LLVM does not fit in a MinGW32
          # link's ~3 GB address space, so 'salam llvm' is a 64-bit-only feature.
          # This is a deliberate, labelled downgrade - NOT a silent fallback.
          make -C compiler -j2 WITH_LLVM=0 CC="ccache gcc" \
            EXTRA_LDFLAGS="-static -static-libgcc"
          ccache --show-stats 2>/dev/null | head -5 || true
          test -f salam.exe || mv salam salam.exe
          ./salam.exe version
          file salam.exe || true

      - name: Verify salam.exe is self-contained (no third-party DLLs)
        shell: 'C:\msys64\usr\bin\bash.exe --login -eo pipefail "{0}"'
        env:
          MSYSTEM: MINGW32
          CHERE_INVOKING: '1'
        run: |
          echo "DLL imports of salam.exe:"
          objdump -p salam.exe | grep -i 'DLL Name' || true
          bad=$(objdump -p salam.exe | grep -i 'DLL Name' \
            | grep -iE 'libzstd|libstdc\+\+|libgcc|libwinpthread|libxml2|libz\.dll|zlib|libz3|libffi|libLLVM|libc\+\+' \
            || true)
          if [ -n "$bad" ]; then
            echo "ERROR: salam.exe depends on non-system DLLs:"
            echo "$bad"
            exit 1
          fi
          echo "OK: salam.exe imports only Windows system DLLs."

      - name: Stage minimal 32-bit bundle
        shell: bash
        run: |
          set -eu
          DIST="salam-windows-i686"
          mkdir -p "$DIST"
          cp salam.exe "$DIST/"
          cp -r compiler/std    "$DIST/std"
          fetch_tcc() {
            out="$1"; file="$2"
            for attempt in 1 2 3 4 5; do
              for base in \
                "https://download.savannah.gnu.org/releases/tinycc" \
                "https://download-mirror.savannah.gnu.org/releases/tinycc" \
                "https://download.savannah.nongnu.org/releases/tinycc"; do
                echo "Fetching $base/$file (attempt $attempt)..."
                if curl -fL --connect-timeout 20 --retry 3 --retry-delay 5 \
                     --retry-all-errors -o "$out" "$base/$file"; then
                  return 0
                fi
              done
              sleep $((attempt * 10))
            done
            echo "ERROR: could not download $file from any Savannah mirror" >&2
            return 1
          }
          fetch_tcc tcc.zip tcc-0.9.27-win32-bin.zip
          7z x tcc.zip -o"$DIST" >/dev/null
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Windows (32-bit / i686) - MINIMAL build."
            echo ""
            echo "Runs on 32-bit and 64-bit Windows. Ships the interpreter and the"
            echo "C backend (bundled 32-bit tcc) only - there is NO embedded LLVM and"
            echo "NO cross-compilation in this build (see below)."
            echo ""
            echo "  salam.exe version"
            echo "  salam.exe exec  myprogram.salam    (tree-walking interpreter)"
            echo "  salam.exe build myprogram.salam    (native exe via bundled 32-bit tcc)"
            echo ""
            echo "Need 'salam llvm' or 'salam build --target=...'? Use the 64-bit"
            echo "Windows build (salam-<ver>-windows.zip)."
          } > "$DIST/RUN-ME.txt"
          echo "bundle contents:"; ls -la "$DIST"

      - name: Smoke-test the minimal 32-bit build
        shell: bash
        run: |
          set -e
          cd salam-windows-i686
          export SALAM_STD="$PWD/std"
          printf 'func main:\n    __ "ok-win32"\nend\n' > smoke.salam
          echo "[1] C backend via bundled 32-bit tcc"
          ./salam.exe build smoke.salam --output=smoke_tcc.exe --log-level=warn
          ./smoke_tcc.exe
          echo "[2] interpreter"
          ./salam.exe exec smoke.salam --log-level=warn
          rm -f smoke.salam smoke*.exe salam_mod_*.c salam_mod_*.h
          cd ..

      - name: Zip the minimal 32-bit bundle
        shell: bash
        run: |
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          7z a -tzip "salam-${VERSION}-windows-i686-minimal.zip" salam-windows-i686 >/dev/null
          ls -la "salam-${VERSION}-windows-i686-minimal.zip"

      - name: Upload minimal 32-bit Windows bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-i686-bundle
          path: salam-*-windows-i686-minimal.zip

      - name: Upload 32-bit salam.exe
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-windows-i686
          path: salam.exe

  build-linux-i686:
    name: Build Salam for Linux (32-bit / i686, minimal)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install 32-bit toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386 ccache
          gcc -m32 --version | head -1
      - name: Cache ccache (Linux i686)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.ccache
          key: ccache-linux-i686-${{ github.run_id }}
          restore-keys: |
            ccache-linux-i686-
      - name: Build 32-bit salam (C backend)
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=300M >/dev/null 2>&1 || true
          make -C compiler -j"$(nproc)" CC="ccache gcc -m32"
          ccache --show-stats 2>/dev/null | head -5 || true
          file salam
          ./salam version
      - name: Smoke-test the 32-bit binary
        run: |
          export SALAM_STD="$PWD/compiler/std"
          printf 'func main:\n    __ "ok-linux-32"\nend\n' > smoke.salam
          ./salam build smoke.salam --output=smoke --log-level=warn && ./smoke
          ./salam exec smoke.salam --log-level=warn || true
          rm -f smoke smoke.salam salam_mod_*.c salam_mod_*.h
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-linux-i686"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Linux (32-bit / i686) - MINIMAL build."
            echo ""
            echo "This build ships the salam frontend only: the interpreter works"
            echo "standalone, but 'salam build' emits C and needs a system C compiler"
            echo "(gcc/clang/tcc) to be installed. There is NO embedded LLVM/LLD and"
            echo "NO bundled compiler."
            echo ""
            echo "  ./salam version"
            echo "  ./salam exec  app.salam            (interpreter - works standalone)"
            echo "  ./salam build app.salam -o app     (needs a system C compiler)"
            echo ""
            echo "For a zero-install experience, cross-compile from the 64-bit Linux"
            echo "flagship (salam-<ver>-linux.zip) instead of using this build."
          } > "$DIST/RUN-ME.txt"
          zip -r "salam-${VERSION}-linux-i686-minimal.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-linux-i686-minimal.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-i686-zip
          path: salam-*-linux-i686-minimal.zip
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-i686
          path: salam

  build-linux-arm:
    name: Build Salam for Linux ARM (${{ matrix.arch }}, minimal)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            cc: aarch64-linux-gnu-gcc
            pkg: gcc-aarch64-linux-gnu
            qemu: qemu-aarch64-static
            sysroot: /usr/aarch64-linux-gnu
          - arch: armhf
            cc: arm-linux-gnueabihf-gcc
            pkg: gcc-arm-linux-gnueabihf
            qemu: qemu-arm-static
            sysroot: /usr/arm-linux-gnueabihf
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cross toolchain + qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.pkg }} qemu-user-static ccache
          ${{ matrix.cc }} --version | head -1
      - name: Cache ccache (${{ matrix.arch }})
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.ccache
          key: ccache-linux-${{ matrix.arch }}-${{ github.run_id }}
          restore-keys: |
            ccache-linux-${{ matrix.arch }}-
      - name: Cross-build salam for ${{ matrix.arch }}
        run: |
          export CCACHE_DIR="$HOME/.ccache"; ccache --max-size=300M >/dev/null 2>&1 || true
          make -C compiler -j"$(nproc)" CC="ccache ${{ matrix.cc }}"
          ccache --show-stats 2>/dev/null | head -5 || true
          file salam
      - name: Smoke-test under qemu
        run: |
          ${{ matrix.qemu }} -L ${{ matrix.sysroot }} ./salam version
      - name: Stage versioned archive
        run: |
          set -eu
          VERSION=$(tr -d ' \t\r\n' < VERSION)
          DIST="salam-linux-${{ matrix.arch }}"
          mkdir -p "$DIST"
          cp salam "$DIST/salam"
          cp -r compiler/std "$DIST/std"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          {
            echo "Salam for Linux ${{ matrix.arch }} - MINIMAL build."
            echo ""
            echo "This build ships the salam frontend only: the interpreter works"
            echo "standalone, but 'salam build' emits C and needs a system C compiler"
            echo "(gcc/clang/tcc) to be installed. There is NO embedded LLVM/LLD and"
            echo "NO bundled compiler for this architecture."
            echo ""
            echo "  ./salam version"
            echo "  ./salam exec  app.salam            (interpreter - works standalone)"
            echo "  ./salam build app.salam -o app     (needs a system C compiler)"
            echo ""
            echo "For a zero-install experience, cross-compile from the 64-bit Linux"
            echo "flagship (salam-<ver>-linux.zip) instead of using this build."
          } > "$DIST/RUN-ME.txt"
          zip -r "salam-${VERSION}-linux-${{ matrix.arch }}-minimal.zip" "$DIST" >/dev/null
          ls -la "salam-${VERSION}-linux-${{ matrix.arch }}-minimal.zip"
      - name: Upload versioned archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-${{ matrix.arch }}-zip
          path: salam-*-linux-${{ matrix.arch }}-minimal.zip
      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: salam-linux-${{ matrix.arch }}
          path: salam

  create-release:
    if: |
      startsWith(github.event.head_commit.message, 'release:') &&
      github.repository == 'SalamLang/Salam'
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      [
        build-linux,
        build-macos,
        build-windows,
        build-windows-i686,
        build-linux-i686,
        build-linux-arm,
      ]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Read version from VERSION file
        id: get_version
        run: |
          VERSION=$(cat VERSION | sed 's/^[ \t]*//;s/[ \t]*$//')
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Salam version: ${VERSION}"
      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux
          path: ./release
      - name: Rename Linux binary to avoid conflict
        run: |
          mv ./release/salam ./release/salam-linux
      - name: Download macOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-macos
          path: ./release
      - name: Rename macOS binary to avoid conflict
        run: |
          mv ./release/salam ./release/salam-mac
      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows
          path: ./release
      - name: Rename Window binary
        run: |
          mv ./release/salam.exe ./release/salam-windows.exe
      - name: Download Windows self-contained bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-bundle
          path: ./release
      - name: Download Linux versioned archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-zip
          path: ./release
      - name: Download macOS versioned archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-macos-zip
          path: ./release
      - name: Download Windows i686 binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-i686
          path: ./release-win-i686
      - name: Download Windows i686 bundle
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-windows-i686-bundle
          path: ./release
      - name: Download Linux i686 binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-i686
          path: ./release-linux-i686
      - name: Download Linux i686 archive
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-i686-zip
          path: ./release
      - name: Download Linux aarch64 binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-aarch64
          path: ./release-linux-aarch64
      - name: Download Linux aarch64 archive
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-aarch64-zip
          path: ./release
      - name: Download Linux armhf binary
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-armhf
          path: ./release-linux-armhf
      - name: Download Linux armhf archive
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: salam-linux-armhf-zip
          path: ./release
      - name: Collect 32-bit / cross binaries (rename to avoid name clashes)
        run: |
          set -eu
          [ -f ./release-win-i686/salam.exe ]     && mv ./release-win-i686/salam.exe     ./release/salam-windows-i686.exe || true
          [ -f ./release-linux-i686/salam ]       && mv ./release-linux-i686/salam       ./release/salam-linux-i686       || true
          [ -f ./release-linux-aarch64/salam ]    && mv ./release-linux-aarch64/salam    ./release/salam-linux-aarch64    || true
          [ -f ./release-linux-armhf/salam ]      && mv ./release-linux-armhf/salam      ./release/salam-linux-armhf      || true
          echo "release/ now contains:"; ls -la ./release
      # - name: Post Linux release file to SERVER_VERSIONS_API
      #   env:
      #     SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
      #     SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
      #   run: |
      #     curl -X POST "$SERVER_VERSIONS_API" \
      #       -F "file=@./release/salam-linux" \
      #       -F "version=${{ env.VERSION }}" \
      #       -F "date=$(date +'%Y-%m-%d')" \
      #       -F "time=$(date +'%H:%M:%S')" \
      #       -F "key='$SERVER_VERSIONS_KEY'" \
      #       -F "platform=linux"
      # - name: Post macOS release file to SERVER_VERSIONS_API
      #   env:
      #     SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
      #     SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
      #   run: |
      #     curl -X POST "$SERVER_VERSIONS_API" \
      #       -F "file=@./release/salam-mac" \
      #       -F "version=${{ env.VERSION }}" \
      #       -F "date=$(date +'%Y-%m-%d')" \
      #       -F "time=$(date +'%H:%M:%S')" \
      #       -F "key='$SERVER_VERSIONS_KEY'" \
      #       -F "platform=macos"
      # - name: Post Windows release file to SERVER_VERSIONS_API
      #   env:
      #     SERVER_VERSIONS_API: ${{ secrets.SERVER_VERSIONS_API }}
      #     SERVER_VERSIONS_KEY: ${{ secrets.SERVER_VERSIONS_KEY }}
      #   run: |
      #     curl -X POST "$SERVER_VERSIONS_API" \
      #       -F "file=@./release/salam-windows.exe" \
      #       -F "version=${{ env.VERSION }}" \
      #       -F "date=$(date +'%Y-%m-%d')" \
      #       -F "time=$(date +'%H:%M:%S')" \
      #       -F "key='$SERVER_VERSIONS_KEY'" \
      #       -F "platform=windows"
      - name: Delete existing release and tag if found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION }}"
          if gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null; then
            echo "Deleted existing release $TAG (and its tag)."
          else
            echo "No existing release $TAG."
          fi
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          shopt -s nullglob
          candidates=(
            # release/salam-linux
            # release/salam-mac
            # release/salam-windows.exe
            # release/salam-linux-i686
            # release/salam-windows-i686.exe
            # release/salam-linux-aarch64
            # release/salam-linux-armhf
            release/salam-*.zip
          )
          assets=()
          for c in "${candidates[@]}"; do
            for f in $c; do [ -e "$f" ] && assets+=("$f"); done
          done
          echo "Publishing ${#assets[@]} assets:"; printf '  %s\n' "${assets[@]}"
          gh release create "v${{ env.VERSION }}" \
            --target "$GITHUB_SHA" \
            --title "Salam Release v${{ env.VERSION }}" \
            --generate-notes \
            "${assets[@]}"
