---
name: 📱 Editor - Build & Release Android APK
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App versionName (e.g. 1.0). Blank keeps the build.gradle.kts default.'
        required: false
        type: string
      version_code:
        description: 'App versionCode (integer). Blank keeps the build.gradle.kts default.'
        required: false
        type: string
      prerelease:
        description: 'Mark the GitHub Release as a pre-release'
        required: false
        type: boolean
        default: false
permissions:
  contents: read
concurrency:
  group: editor-android-release
  cancel-in-progress: false
jobs:
  build-release:
    name: Build & release signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate signing secrets are configured
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          missing=0
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD \
                   ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            eval "val=\${$v:-}"
            if [ -z "$val" ]; then
              echo "::error::missing required repository secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Configure the release keystore secrets before running this workflow."
            exit 1
          fi

      - name: Set up JDK 21 (Temurin) + Gradle cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            android/gradle/wrapper/gradle-wrapper.properties
            android/gradle/libs.versions.toml
            android/**/*.gradle.kts

      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses \
            >/dev/null 2>&1 || true

      - name: Decode release keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -eu
          ks="$RUNNER_TEMP/salam-editor-release.keystore"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$ks"
          echo "path=$ks" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_FILE: ${{ steps.keystore.outputs.path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          set -eu
          chmod +x ./gradlew
          args=(":app:assembleRelease" ":app:bundleRelease" "--no-daemon" "--stacktrace")
          [ -n "$VERSION_NAME" ] && args+=("-PappVersionName=$VERSION_NAME")
          [ -n "$VERSION_CODE" ] && args+=("-PappVersionCode=$VERSION_CODE")
          ./gradlew "${args[@]}"

      - name: Collect & rename the APK + AAB
        id: apk
        run: |
          set -eu
          meta="android/app/build/outputs/apk/release/output-metadata.json"
          apk_dir="android/app/build/outputs/apk/release"
          aab_dir="android/app/build/outputs/bundle/release"
          vname=$(jq -r '.elements[0].versionName' "$meta")
          vcode=$(jq -r '.elements[0].versionCode' "$meta")
          apk_src="$apk_dir/$(jq -r '.elements[0].outputFile' "$meta")"
          aab_src=$(ls "$aab_dir"/*.aab | head -1)
          apk_name="salam-editor-v${vname}-${vcode}.apk"
          aab_name="salam-editor-v${vname}-${vcode}.aab"
          mkdir -p dist
          cp "$apk_src" "dist/$apk_name"
          cp "$aab_src" "dist/$aab_name"
          {
            echo "apk_name=$apk_name"
            echo "apk_path=dist/$apk_name"
            echo "aab_name=$aab_name"
            echo "aab_path=dist/$aab_name"
            echo "artifact=salam-editor-android-v${vname}-${vcode}"
            echo "vname=$vname"
            echo "vcode=$vcode"
            echo "tag=editor-android-v${vname}-${vcode}"
          } >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Verify APK signature
        env:
          APK_PATH: ${{ steps.apk.outputs.apk_path }}
        run: |
          set -eu
          apksigner=$(ls "$ANDROID_HOME"/build-tools/*/apksigner 2>/dev/null \
            | sort -V | tail -1 || true)
          if [ -n "$apksigner" ]; then
            "$apksigner" verify --verbose --print-certs "$APK_PATH"
          else
            echo "::warning::apksigner not found; skipping signature verification"
          fi

      - name: Upload APK + AAB artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.apk.outputs.artifact }}
          path: |
            ${{ steps.apk.outputs.apk_path }}
            ${{ steps.apk.outputs.aab_path }}
          if-no-files-found: error

      - name: Create GitHub Release with the APK + AAB
        if: github.repository == 'SalamLang/Salam'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.apk.outputs.tag }}
          APK_PATH: ${{ steps.apk.outputs.apk_path }}
          AAB_PATH: ${{ steps.apk.outputs.aab_path }}
          VNAME: ${{ steps.apk.outputs.vname }}
          VCODE: ${{ steps.apk.outputs.vcode }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -eu
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null \
            && echo "Deleted existing release $TAG." \
            || echo "No existing release $TAG."
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          args=("$TAG"
                "--target" "$GITHUB_SHA"
                "--title" "Salam Editor (Android) v${VNAME} (build ${VCODE})"
                "--generate-notes")
          [ "$PRERELEASE" = "true" ] && args+=("--prerelease")
          gh release create "${args[@]}" "$APK_PATH" "$AAB_PATH"
