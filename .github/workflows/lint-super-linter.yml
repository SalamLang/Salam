---
name: 🔍 Lint - Super-Linter
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  lint:
    permissions:
      contents: read
      statuses: write
    name: Run Super-Linter
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout ${{ github.ref }} ( ${{ github.sha }} )'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_BIOME_FORMAT: false
          VALIDATE_BIOME_LINT: false
          VALIDATE_C: false
          VALIDATE_CPP: false
          VALIDATE_CSS_PRETTIER: false
          # benchmark/programs/<NN>_name/ dirs each have an independent
          # "package main" prog.go; golangci-lint errors when handed explicit
          # file paths spanning multiple dirs ("named files must all be in
          # one directory"). Same root cause as VALIDATE_PYTHON_MYPY below.
          VALIDATE_GO: false
          VALIDATE_HTML_PRETTIER: false
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          # benchmark/programs/<NN>_name/prog.py is deliberately duplicated
          # per numbered directory across many language variants; mypy
          # computes module names from bare filenames and cannot tell the 14
          # "prog.py" files apart (no fix works: __init__.py needs valid
          # identifiers, --exclude/--explicit-package-bases don't apply to
          # explicit file args). Pylint/Flake8/Ruff/Black/isort still cover
          # these files.
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_TSX: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
