name: 🧪 Build & test (Alpine + LLVM 22)
on:
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  build-test:
    name: Build salam and run the test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build toolchain image (cached)
        uses: docker/build-push-action@v7
        with:
          context: compiler
          file: compiler/docker/Dockerfile
          target: toolchain
          tags: salam-toolchain:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/compiler":/work -w /work \
            salam-toolchain:ci \
            sh -c 'make -j"$(nproc)" && make test'
