name: 🧪 Build & test (Alpine + LLVM 22)
on:
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  build-test:
    name: Build salam and run the test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build toolchain image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: compiler
          file: compiler/docker/Dockerfile
          target: toolchain
          tags: salam-toolchain:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/compiler":/work -w /work \
            salam-toolchain:ci \
            sh -c 'make -j"$(nproc)" && make test'
