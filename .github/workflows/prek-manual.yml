---
# https://github.com/j178/prek
name: 🛠️ Prek - Manual Hooks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prek-manual:
    name: Prek Manual Hooks - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-26.04 }
          - { os: ubuntu-24.04 }
          - { os: ubuntu-22.04 }
          - { os: ubuntu-slim }
          - { os: macos-26 }
          - { os: macos-15 }
          - { os: macos-14 }
          - { os: windows-2025-vs2026 }
          - { os: windows-2025 }
          - { os: windows-2022 }
          # - { os: windows-11-arm } `shfmt-binary` is not supported on your platform
    steps:
      - name: 'Checkout ${{ github.ref }} ( ${{ github.sha }} )'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run prek-action
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2.0.4
        with:
          install-only: true
      - name: Run manual prek hooks
        run: prek run --all-files --hook-stage manual
