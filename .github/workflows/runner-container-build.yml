---
name: 🐳 Runner - Track latest Salam release in sandbox image

on:
  workflow_run:
    workflows: ['🚀 Compiler - Build & Release Binaries']
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    if: |
      github.repository == 'SalamLang/Salam' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    name: Rebuild sandbox image against the latest release and redeploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy (builds + pushes the sandbox image tracking latest, then the Worker)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'runner'
          packageManager: bun
