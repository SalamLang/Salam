---
name: 🐳 Runner - Track latest Salam release in sandbox image

# Keeps the runner's sandbox container (runner/container/Dockerfile) pinned
# to the latest published Salam release, so the "salam runner" API always
# runs the current toolchain without any per-request download from GitHub.
#
# Triggered via workflow_run (not `on: release: published`) because
# compiler-release.yml creates releases using the default GITHUB_TOKEN, and
# GitHub does not let GITHUB_TOKEN-authored events trigger further
# `push`/`release`-type workflow runs. workflow_run has no such restriction,
# so it reliably fires once the release workflow finishes - see
# https://docs.github.com/actions/using-workflows/triggering-a-workflow#triggering-a-workflow-from-a-workflow
#
# For the same reason, this workflow deploys the runner itself in the same
# job (rather than bumping the Dockerfile, pushing, and hoping
# runner-deploy-cloudflare.yml's `on: push` trigger fires for that commit).

on:
  workflow_run:
    workflows: ["🚀 Compiler - Build & Release Binaries"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bump-and-deploy:
    if: |
      github.repository == 'SalamLang/Salam' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    name: Bump sandbox image to latest release and redeploy
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: true

      - name: Look up the latest published release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          TAG=$(gh release view --json tagName -q .tagName -R "${GITHUB_REPOSITORY}")
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Bump ARG SALAM_VERSION in the sandbox Dockerfile
        id: bump
        run: |
          set -eu
          FILE="runner/container/Dockerfile"
          VERSION="${{ steps.latest.outputs.version }}"
          if ! grep -q '^ARG SALAM_VERSION=' "$FILE"; then
            echo "::error::could not find 'ARG SALAM_VERSION=' in $FILE"
            exit 1
          fi
          sed -i "s/^ARG SALAM_VERSION=.*/ARG SALAM_VERSION=${VERSION}/" "$FILE"
          if git diff --quiet -- "$FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit the version bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runner/container/Dockerfile
          git commit -m "runner: track Salam ${{ steps.latest.outputs.tag }} in sandbox image"
          git push origin HEAD:main

      - name: Setup Bun
        if: steps.bump.outputs.changed == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
          no-cache: true

      - name: Install dependencies
        if: steps.bump.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Deploy (builds + pushes the updated sandbox image, then the Worker)
        if: steps.bump.outputs.changed == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'runner'
          packageManager: bun
