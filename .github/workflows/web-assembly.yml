name: 🌐 Build and Deploy WebAssembly
on:
  push:
    branches:
      - main
    paths:
      - 'compiler/src/**'
      - 'compiler/std/**'
      - 'compiler/tools/**'
      - '.github/workflows/web-assembly.yml'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: web-assembly-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies (tcc)
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y tcc

      - name: Install Emscripten SDK
        run: |
          set -e
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          cd "$HOME/emsdk"
          ./emsdk install latest
          ./emsdk activate latest
          . ./emsdk_env.sh
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$EMSDK/.emscripten" >> "$GITHUB_ENV"

      - name: Build native compiler + WebAssembly playground bundle
        run: |
          set -e
          emcc --version
          cd compiler
          sh tools/bash/update-playground.sh

      - name: Show generated editor assets
        run: |
          ls -l editor/salam-wa.js editor/salam-wa.wasm editor/salam-wa.data editor/keywords.js

      - name: Publish playground to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          # editor/ is gitignored on main; publish it to a clean orphan
          # gh-pages branch (single-commit history, force-pushed each build).
          PUBDIR="$(mktemp -d)"
          cp -r editor/. "$PUBDIR/"
          touch "$PUBDIR/.nojekyll"
          cd "$PUBDIR"
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy WebAssembly playground [skip ci]"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          echo "Published $(ls -1 | wc -l) files to gh-pages."
