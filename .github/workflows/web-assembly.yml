name: 🌐 Build and Deploy WebAssembly
on:
  push:
    branches:
      - main
    paths:
      - 'compiler/src/**'
      - 'compiler/std/**'
      - 'compiler/tools/**'
      - 'editor/**'
      - 'examples/**'
      - '.github/workflows/web-assembly.yml'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: web-assembly-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install build dependencies (tcc)
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y tcc

      - name: Cache Emscripten SDK
        id: emsdk-cache
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/emsdk
          key: emsdk-${{ runner.os }}-v1

      - name: Install Emscripten SDK
        run: |
          set -e
          if [ ! -x "$HOME/emsdk/emsdk" ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$HOME/emsdk"
          fi
          cd "$HOME/emsdk"
          if [ ! -d "upstream/emscripten" ]; then
            ./emsdk install latest
            ./emsdk activate latest
          else
            echo "Emscripten SDK restored from cache - skipping install"
          fi
          . ./emsdk_env.sh
          echo "$EMSDK" >> "$GITHUB_PATH"
          echo "$EMSDK/upstream/emscripten" >> "$GITHUB_PATH"
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$EMSDK/.emscripten" >> "$GITHUB_ENV"

      - name: Verify editor source files are present
        run: |
          set -eu
          missing=0
          for f in editor/index.html editor/style.css editor/app.js editor/logo.svg; do
            if [ ! -f "$f" ]; then
              echo "::error::missing editor source file: $f (is it committed? editor/* is gitignored except sources)"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Build native compiler + WebAssembly playground bundle
        run: |
          set -e
          emcc --version
          cd compiler
          sh tools/bash/update-playground.sh

      - name: Verify generated editor assets
        run: |
          set -eu
          missing=0
          for f in editor/salam-wa.js editor/salam-wa.wasm editor/salam-wa.data \
                   editor/keywords.js editor/examples.js; do
            if [ ! -f "$f" ]; then
              echo "::error::missing generated asset: $f"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo "==> Editor directory to be published:"
          ls -l editor/

      - name: Publish playground to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          PUBDIR="$(mktemp -d)"
          cp -rT editor "$PUBDIR"
          touch "$PUBDIR/.nojekyll"
          cd "$PUBDIR"
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy WebAssembly playground [skip ci]"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
          echo "Published the following files to gh-pages:"
          git ls-files
