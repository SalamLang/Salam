---
# Docker Compose for the Salam benchmark suite.
#
#   Build once (repeat only when you want newer toolchain versions):
#     docker compose -f benchmark/docker/docker-compose.yml build bench
#
#   Full suite -> RESULTS.md, results/results.json, results/results.csv:
#     docker compose -f benchmark/docker/docker-compose.yml run --rm bench
#
#   One program, more repetitions:
#     docker compose -f benchmark/docker/docker-compose.yml run --rm bench 03_primes_count
#     docker compose -f benchmark/docker/docker-compose.yml run --rm -e BENCH_RUNS=20 bench
#
#   Ad hoc shell with the full toolchain and a live repo bind-mount:
#     docker compose -f benchmark/docker/docker-compose.yml run --rm shell
#

services:
  bench:
    build:
      context: ../..
      dockerfile: benchmark/docker/Dockerfile
      target: bench
      args:
        ALPINE_VERSION: edge
        LLVM_VERSION: '22'
    image: salam-bench:latest
    init: true
    user: '${HOST_UID:-1000}:${HOST_GID:-1000}'
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../RESULTS.md:/repo/benchmark/RESULTS.md
      - ../results:/repo/benchmark/results

  shell:
    build:
      context: ../..
      dockerfile: benchmark/docker/Dockerfile
      target: shell
      args:
        ALPINE_VERSION: edge
        LLVM_VERSION: '22'
    image: salam-bench:shell
    init: true
    stdin_open: true
    tty: true
    user: '${HOST_UID:-1000}:${HOST_GID:-1000}'
    security_opt:
      - no-new-privileges:true
    volumes:
      - ../..:/repo
    working_dir: /repo/benchmark
