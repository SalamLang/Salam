# Docker Compose for the Salam compiler.
#
#   Development (live reload):   docker compose up dev
#   Production (build + run):    docker compose run --rm prod build app.salam --output=app
#
# `dev` bind-mounts the working tree and recompiles ./salam on every change.
# `prod` builds a self-contained image (COPY . + make install) and runs `salam`.

services:
  # -------------------------------------------------------------------------
  # Live development: source is mounted from the host, salam is rebuilt on
  # every change to src/ (see tools/docker-dev.sh). The compiled ./salam and
  # build/ tree appear in your working directory.
  # -------------------------------------------------------------------------
  dev:
    build:
      context: .
      target: dev
      args:
        ALPINE_VERSION: edge
        LLVM_VERSION: "22"
    image: salam:dev
    init: true
    stdin_open: true
    tty: true
    volumes:
      - .:/app
      # Keep host build artifacts out of the bind mount (optional, avoids
      # clobbering a native build on the host with the Linux/musl one):
      - salam-build:/app/build
    working_dir: /app

  # -------------------------------------------------------------------------
  # Production: the image bakes in a fully built + installed compiler.
  # `salam` is the entrypoint; pass it any subcommand/arguments. The current
  # directory is mounted at /work so you can compile your own .salam files.
  # -------------------------------------------------------------------------
  prod:
    build:
      context: .
      target: prod
      args:
        ALPINE_VERSION: edge
        LLVM_VERSION: "22"
    image: salam:prod
    init: true
    volumes:
      - .:/work
    working_dir: /work
    # Override at the CLI, e.g.
    #   docker compose run --rm prod build examples/en/hello.salam --output=hello
    command: ["--help"]

volumes:
  salam-build:
