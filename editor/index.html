<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salam Playground</title>
    <link rel="icon" href="assets/logo.svg">
    <meta
      name="description"
      content="Try the Salam programming language live in your browser. Salam supports English, Persian (Farsi), and Arabic and compiles to native code and WebAssembly."
    >
    <meta name="author" content="SalamLang">
    <meta name="theme color" content="#e05a1e">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://salamlang.github.io/Salam/">
    <meta property="og:site_name" content="Salam Playground">
    <meta property="og:title" content="Salam Playground">
    <meta
      property="og:description"
      content="Try the Salam programming language live in your browser. Salam supports English, Persian (Farsi), and Arabic and compiles to native code and WebAssembly."
    >
    <meta
      property="og:image"
      content="https://salamlang.github.io/Salam/logo-box.png"
    >
    <meta property="og:image:alt" content="Salam programming language logo">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Salam Playground">
    <meta
      name="twitter:description"
      content="Try the Salam programming language live in your browser. Salam supports English, Persian (Farsi), and Arabic and compiles to native code and WebAssembly."
    >
    <meta
      name="twitter:image"
      content="https://salamlang.github.io/Salam/logo-box.png"
    >
    <meta name="twitter:image:alt" content="Salam programming language logo">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&amp;display=swap"
    >
    <style>
    :root {
      --accent: #ff7a18;
      --accent-2: #1e90ff;
      --danger: #ff5c5c;
      --warn: #e0a92b;
      --font:
        "Vazirmatn", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --mono:
        "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, "Vazirmatn",
        monospace;
    }
    :root,
    :root[data-theme="dark"] {
      --bg: #0f1115;
      --panel: #161922;
      --panel-2: #1d2230;
      --border: #2a3040;
      --fg: #e6e9ef;
      --muted: #8a93a6;
      --editor-bg: #1e1e1e;
      --editor-fg: #d4d4d4;
      --t-comment: #6a9955;
      --t-keyword: #569cd6;
      --t-type: #4ec9b0;
      --t-string: #ce9178;
      --t-number: #b5cea8;
      --t-op: #c586c0;
      --indent-guide: #3a3f4b;
      --shadow: rgb(0 0 0 / 35%);
    }
    :root[data-theme="light"] {
      --bg: #f4f6fa;
      --panel: #fff;
      --panel-2: #eef1f6;
      --border: #d8dde7;
      --fg: #1b2030;
      --muted: #6b7280;
      --editor-bg: #fff;
      --editor-fg: #1b2030;
      --t-comment: #008000;
      --t-keyword: #00f;
      --t-type: #267f99;
      --t-string: #a31515;
      --t-number: #098658;
      --t-op: #af00db;
      --indent-guide: #d0d5de;
      --shadow: rgb(20 30 60 / 18%);
    }
    * {
      box-sizing: border-box;
    }
    html,
    body {
      height: 100%;
      margin: 0;
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: opacity 0.15s;
      border-radius: 4px;
    }
    .brand:hover {
      opacity: 0.85;
    }
    .brand:focus-visible {
      opacity: 0.85;
      outline: 2px solid var(--fg);
      outline-offset: 4px;
    }
    .logo-mark {
      width: 30px;
      height: 30px;
      display: inline-block;
      flex: 0 0 auto;
      background: var(--accent);
      mask-image: url(assets/logo.svg);
      mask-position: center;
      mask-size: contain;
      mask-repeat: no-repeat;
    }
    .brand-name {
      font-weight: 600;
      color: var(--fg);
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .menu-toggle {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      padding: 0px;
      gap: 0px;
      position: relative;
      z-index: 90;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
    }
    .menu-toggle:hover {
      border-color: var(--accent);
    }
    .menu-toggle .bar {
      display: block;
      width: 20px;
      height: 2px;
      border-radius: 2px;
      background: var(--fg);
      transition:
        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
        opacity 0.2s ease;
    }
    .menu-toggle .bar + .bar {
      margin-top: 5px;
    }
    body.menu-open .menu-toggle .bar:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    body.menu-open .menu-toggle .bar:nth-child(2) {
      opacity: 0;
    }
    body.menu-open .menu-toggle .bar:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }
    .scrim {
      position: fixed;
      top: 0px;
      right: 0px;
      bottom: 0px;
      left: 0px;
      background: rgb(0 0 0 / 45%);
      z-index: 70;
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 0.25s ease,
        visibility 0.25s ease;
    }
    body.menu-open .scrim {
      opacity: 1;
      visibility: visible;
    }
    .seg {
      display: inline-flex;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .seg-btn {
      background: transparent;
      color: var(--muted);
      border: 0;
      cursor: pointer;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 14px;
      transition: 0.15s;
    }
    .seg-btn:hover {
      color: var(--fg);
    }
    .seg-btn.active {
      background: var(--accent);
      color: #2a1402;
      font-weight: 600;
    }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }
    .toggle:hover {
      color: var(--fg);
    }
    .toggle .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: 0.15s;
    }
    .toggle.on {
      color: var(--fg);
      border-color: var(--accent);
    }
    .toggle.on .dot {
      background: var(--accent);
      box-shadow: 0 0 7px var(--accent);
    }
    .theme-ico {
      font-size: 15px;
      line-height: 1;
    }
    .dropdown {
      position: relative;
    }
    .dd-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--panel-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
    }
    .dd-button:hover {
      border-color: var(--accent);
    }
    .dd-caret {
      color: var(--muted);
      font-size: 11px;
      transition: transform 0.15s;
    }
    .dropdown.open .dd-caret {
      transform: rotate(180deg);
    }
    .dd-list {
      position: absolute;
      top: calc(100% + 5px);
      left: 0px;
      margin: 0px;
      padding: 5px;
      list-style: none;
      min-width: 210px;
      max-height: 340px;
      overflow: auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 10px 30px var(--shadow);
      z-index: 60;
    }
    .dd-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      color: var(--fg);
      white-space: nowrap;
    }
    .dd-item:hover {
      background: var(--accent);
      color: #2a1402;
    }
    .dd-item.sel {
      color: var(--accent);
      font-weight: 600;
    }
    .dd-item.sel:hover {
      color: #2a1402;
    }
    .dd-item.custom {
      font-style: italic;
    }
    .dd-text {
      flex: 1 1 auto;
    }
    .ic {
      flex: 0 0 auto;
      vertical-align: middle;
      opacity: 0.85;
    }
    .ic.web {
      color: var(--accent);
      opacity: 1;
    }
    .dd-item:hover .ic {
      color: #2a1402;
      opacity: 1;
    }
    #dd-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .dd-head {
      padding: 9px 12px 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: default;
      pointer-events: none;
    }
    .dd-head:not(:first-child) {
      margin-top: 5px;
      border-top: 1px solid var(--border);
      padding-top: 9px;
    }
    .dd-head.web {
      color: var(--accent);
    }
    .dd-item.is-web {
      background: color-mix(in srgb, var(--accent) 9%, transparent);
    }
    .dd-item.is-web:hover {
      background: var(--accent);
    }
    .dd-badge {
      margin-inline-start: auto;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 5px;
      padding: 1px 6px;
    }
    .dd-item.is-web:hover .dd-badge {
      color: #2a1402;
      border-color: #2a1402;
    }
    .run-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #2a1402;
      border: 0;
      border-radius: 8px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
    }
    .run-btn:hover:not(:disabled) {
      filter: brightness(1.08);
    }
    .run-btn:disabled {
      opacity: 0.5;
      cursor: progress;
    }
    .run-icon {
      font-size: 12px;
    }
    .split {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: var(--col-a, 1fr) 6px 1fr;
      min-height: 0px;
    }
    .pane {
      display: flex;
      flex-direction: column;
      min-width: 0px;
      min-height: 0px;
    }
    .gutter {
      position: relative;
      z-index: 5;
      background: var(--border);
      cursor: col-resize;
      touch-action: none;
      user-select: none;
      transition: background 0.15s;
    }
    .gutter:hover {
      background: var(--accent);
    }
    .gutter.dragging {
      background: var(--accent);
    }
    .pane-head {
      flex: 0 0 auto;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--muted);
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .head-end {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }
    .icon-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      background: var(--panel-2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 9px;
      font-family: inherit;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      transition: 0.15s;
    }
    .icon-btn:hover {
      color: var(--fg);
      border-color: var(--accent);
    }
    .icon-btn:active {
      transform: translateY(1px);
    }
    .icon-btn .icon-mark {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      display: inline-block;
      background: currentColor;
    }
    .icon-btn .icon-mark.mk-copy {
      mask-image: url(assets/copy.svg);
      mask-position: center;
      mask-size: contain;
      mask-repeat: no-repeat;
    }
    .icon-btn .icon-mark.mk-check {
      mask-image: url(assets/check.svg);
      mask-position: center;
      mask-size: contain;
      mask-repeat: no-repeat;
      display: none;
    }
    .icon-btn.copied {
      color: var(--accent);
      border-color: var(--accent);
    }
    .icon-btn.copied .mk-copy {
      display: none;
    }
    .icon-btn.copied .mk-check {
      display: inline-block;
    }
    .editor-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0px;
      overflow: hidden;
      background: var(--editor-bg);
    }
    .hl {
      position: absolute;
      top: 0px;
      right: 0px;
      bottom: 0px;
      left: 0px;
      margin: 0px;
      padding: 14px 16px;
      padding-inline-start: calc(var(--ln-w, 40px) + 14px);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      tab-size: 4;
      white-space: pre;
      overflow-wrap: normal;
      border: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
      color: var(--editor-fg);
    }
    .code {
      position: absolute;
      top: 0px;
      right: 0px;
      bottom: 0px;
      left: 0px;
      margin: 0px;
      padding: 14px 16px;
      padding-inline-start: calc(var(--ln-w, 40px) + 14px);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      tab-size: 4;
      white-space: pre;
      overflow-wrap: normal;
      border: 0;
      z-index: 2;
      background: transparent;
      color: transparent;
      caret-color: var(--editor-fg);
      resize: none;
      outline: none;
      overflow: auto;
    }
    .code::selection {
      background: rgb(255 122 24 / 30%);
    }
    .code[dir="rtl"] {
      text-align: right;
    }
    .hl[dir="rtl"] {
      text-align: right;
    }
    .ln {
      position: absolute;
      top: 0px;
      bottom: 0px;
      inset-inline-start: 0;
      width: var(--ln-w, 40px);
      z-index: 3;
      overflow: hidden;
      background: var(--editor-bg);
      border-inline-end: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
      pointer-events: none;
      user-select: none;
    }
    .ln-inner {
      position: absolute;
      top: 0px;
      left: 0px;
      right: 0px;
      will-change: transform;
    }
    .ln-row {
      position: relative;
      padding-inline: 16px 9px;
      text-align: end;
    }
    .ln-row.cur {
      color: var(--fg);
    }
    .ln-row.err {
      color: var(--danger);
      font-weight: 600;
      pointer-events: auto;
      cursor: help;
    }
    .ln-row.warn {
      color: var(--warn);
      font-weight: 600;
      pointer-events: auto;
      cursor: help;
    }
    .ln-row.err::before {
      position: absolute;
      left: 5px;
      top: 50%;
      width: 7px;
      height: 7px;
      margin-top: -3.5px;
      border-radius: 50%;
      background: var(--danger);
    }
    .ln-row.warn::before {
      position: absolute;
      left: 5px;
      top: 50%;
      width: 7px;
      height: 7px;
      margin-top: -3.5px;
      border-radius: 50%;
      background: var(--warn);
    }
    .hl .c {
      color: var(--t-comment);
      font-style: italic;
    }
    .hl .k {
      color: var(--t-keyword);
    }
    .hl .t {
      color: var(--t-type);
    }
    .hl .s {
      color: var(--t-string);
    }
    .hl .n {
      color: var(--t-number);
    }
    .hl .o {
      color: var(--t-op);
    }
    .output {
      flex: 1 1 auto;
      margin: 0px;
      padding: 14px 16px;
      overflow: auto;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      color: var(--fg);
      background: var(--editor-bg);
    }
    .output.error {
      color: var(--danger);
    }
    .output.codeview {
      direction: ltr;
      text-align: left;
      white-space: pre;
    }
    .output.xml .xb {
      color: var(--t-op);
    }
    .output.xml .xt {
      color: var(--t-keyword);
    }
    .output.xml .xa {
      color: var(--t-type);
    }
    .output.xml .xv {
      color: var(--t-string);
    }
    .output.xml .xc {
      color: var(--t-comment);
      font-style: italic;
    }
    .output.xml .xp {
      color: var(--t-comment);
    }
    .output.ir .ik {
      color: var(--t-keyword);
    }
    .output.ir .it {
      color: var(--t-type);
    }
    .output.ir .is {
      color: var(--t-string);
    }
    .output.ir .in {
      color: var(--t-number);
    }
    .output.ir .ic {
      color: var(--t-comment);
      font-style: italic;
    }
    .output.ir .ig {
      color: var(--accent);
    }
    .output.ir .il {
      color: var(--accent-2);
    }
    .output.ir .im {
      color: var(--muted);
    }
    .output.ir .ilbl {
      color: var(--accent-2);
      font-weight: 600;
    }
    .output.ir .io {
      color: var(--t-op);
    }
    .output.clang .cm {
      color: var(--t-comment);
      font-style: italic;
    }
    .output.clang .cpp {
      color: var(--accent);
    }
    .output.clang .cs {
      color: var(--t-string);
    }
    .output.clang .cl {
      color: var(--t-string);
    }
    .output.clang .cn {
      color: var(--t-number);
    }
    .output.clang .ck {
      color: var(--t-keyword);
    }
    .output.clang .ct {
      color: var(--t-type);
    }
    .output.clang .co {
      color: var(--t-op);
    }
    .output.clang .cf {
      color: #dcdcaa;
    }
    :root[data-theme="light"] .output.clang .cf {
      color: #795e26;
    }
    .seg.views {
      overflow-x: auto;
      max-width: 100%;
    }
    .seg.views .seg-btn {
      padding: 5px 10px;
      font-size: 12.5px;
      white-space: nowrap;
    }
    .preview {
      flex: 1 1 auto;
      border: 0;
      width: 100%;
      background: #fff;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
    }
    .status.busy {
      color: var(--accent-2);
    }
    .status.ok {
      color: var(--accent);
    }
    .status.err {
      color: var(--danger);
    }
    :root[dir="rtl"] body {
      direction: rtl;
    }
    .banner {
      background: #3a2a00;
      color: #ffd479;
      border-bottom: 1px solid #5a4300;
      padding: 8px 16px;
      font-size: 13px;
      text-align: center;
    }
    .banner code {
      background: rgb(255 255 255 / 8%);
      padding: 1px 6px;
      border-radius: 4px;
    }
    @media (max-width: 900px) {
      .split {
        grid-template-columns: 1fr;
        grid-template-rows: var(--row-a, 1fr) 6px 1fr;
      }
      .gutter {
        cursor: row-resize;
      }
    }
    @media (max-width: 1024px) {
      .menu-toggle {
        display: inline-flex;
      }
      .toolbar {
        padding: 10px 14px;
      }
      .controls {
        position: fixed;
        inset-block: 0;
        inset-inline-end: 0;
        z-index: 80;
        width: min(330px, 86vw);
        margin: 0;
        flex-direction: column;
        align-items: stretch;
        flex-wrap: nowrap;
        gap: 14px;
        padding: 78px 18px calc(24px + env(safe-area-inset-bottom));
        background: var(--panel);
        border-inline-start: 1px solid var(--border);
        box-shadow: -14px 0 44px var(--shadow);
        overflow-y: auto;
        transform: translateX(110%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      :root[dir="rtl"] .controls {
        border-inline-start: 0;
        border-inline-end: 1px solid var(--border);
        box-shadow: 14px 0 44px var(--shadow);
        transform: translateX(-110%);
      }
      body.menu-open .controls,
      :root[dir="rtl"] body.menu-open .controls {
        transform: translateX(0);
      }
      body.menu-open {
        overflow: hidden;
      }
      .controls .seg {
        display: flex;
        width: 100%;
      }
      .controls .seg-btn {
        flex: 1 1 0;
        justify-content: center;
        padding: 11px 12px;
