<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Salam Playground</title>
    <meta
      name="description"
      content="Try the Salam programming language live in your browser. Salam supports Persian (Farsi) and English and compiles to native code and WebAssembly."
    >
    <meta name="author" content="SalamLang">
    <meta name="theme-color" content="#e05a1e">
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://salamlang.github.io/Salam/">
    <meta property="og:site_name" content="Salam Playground">
    <meta property="og:title" content="Salam Playground">
    <meta
      property="og:description"
      content="Try the Salam programming language live in your browser. Salam supports Persian (Farsi) and English and compiles to native code and WebAssembly."
    >
    <meta
      property="og:image"
      content="https://salamlang.github.io/Salam/logo-box.png"
    >
    <meta property="og:image:alt" content="Salam programming language logo">
    <!-- Twitter -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Salam Playground">
    <meta
      name="twitter:description"
      content="Try the Salam programming language live in your browser. Salam supports Persian (Farsi) and English and compiles to native code and WebAssembly."
    >
    <meta
      name="twitter:image"
      content="https://salamlang.github.io/Salam/logo-box.png"
    >
    <meta name="twitter:image:alt" content="Salam programming language logo">
    <link rel="icon" href="logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="toolbar">
      <a href="?" class="brand">
        <span class="logo-mark" aria-hidden="true"></span>
        <span class="brand-name" data-i18n="title">Salam Playground</span>
      </a>
      <button
        type="button"
        id="menu-toggle"
        class="menu-toggle"
        aria-label="Menu"
        aria-controls="controls"
        aria-expanded="false"
      >
        <span class="bar"></span><span class="bar"></span
        ><span class="bar"></span>
      </button>
      <div class="controls" id="controls">
        <div class="seg" id="mode-seg" role="tablist">
          <button
            type="button"
            class="seg-btn active"
            data-mode="app"
            data-i18n="mode_app"
          >
            App
          </button>
          <button
            type="button"
            class="seg-btn"
            data-mode="layout"
            data-i18n="mode_layout"
          >
            Layout
          </button>
        </div>
        <div class="seg" id="lang-seg">
          <button type="button" class="seg-btn active" data-lang="en">
            English
          </button>
          <button type="button" class="seg-btn" data-lang="fa">فارسی</button>
        </div>
        <div class="dropdown" id="examples">
          <button
            type="button"
            class="dd-button"
            id="dd-button"
            aria-haspopup="listbox"
          >
            <span id="dd-label">Examples</span><span class="dd-caret">▾</span>
          </button>
          <ul class="dd-list" id="dd-list" hidden></ul>
        </div>
        <button type="button" id="theme" class="toggle" title="Theme">
          <span class="theme-ico">◐</span><span class="theme-lbl">Auto</span>
        </button>
        <button
          type="button"
          id="autorun"
          class="toggle on"
          title="Auto-run"
          aria-pressed="true"
        >
          <span class="dot"></span><span data-i18n="autorun">Auto-run</span>
        </button>
        <button type="button" id="run" class="run-btn" disabled>
          <span class="run-icon">▶</span>
          <span data-i18n="run">Run</span>
        </button>
      </div>
    </header>
    <div id="scrim" class="scrim" aria-hidden="true"></div>
    <main class="split">
      <section class="pane editor-pane">
        <div class="pane-head">
          <span data-i18n="editor">Editor</span>
          <button class="icon-btn" id="copy-code" type="button" title="Copy">
            <svg
              class="ic-copy"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.4"
              aria-hidden="true"
            >
              <rect x="5.5" y="5.5" width="8" height="9" rx="1.5" />
              <path
                d="M10.5 5.5V3.5A1.5 1.5 0 0 0 9 2H3.5A1.5 1.5 0 0 0 2 3.5v7A1.5 1.5 0 0 0 3.5 12h2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg
              class="ic-check"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.7"
              aria-hidden="true"
            >
              <path
                d="M3.5 8.5l3 3 6-6.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <span class="icon-btn-lbl" data-i18n="copy">Copy</span>
          </button>
        </div>
        <div class="editor-wrap">
          <pre id="hl" class="hl" aria-hidden="true"></pre>
          <textarea
            id="code"
            class="code"
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            wrap="off"
          ></textarea>
        </div>
      </section>
      <!-- biome-ignore lint/a11y/useSemanticElements: focusable, draggable window splitter. an <hr> would lose the interactive resize behavior and styling -->
      <div
        class="gutter"
        id="gutter"
        role="separator"
        aria-orientation="vertical"
        aria-valuenow="50"
        aria-valuemin="0"
        aria-valuemax="100"
        tabindex="0"
        title="Drag to resize · double-click to reset"
      ></div>
      <section class="pane result-pane">
        <div class="pane-head">
          <div class="seg views" id="view-seg" role="tablist">
            <button
              type="button"
              class="seg-btn active"
              data-view="run"
              data-i18n="view_run"
            >
              Run
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="tokens"
              data-i18n="view_tokens"
            >
              Tokens
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="ast"
              data-i18n="view_ast"
            >
              AST
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="symbols"
              data-i18n="view_symbols"
            >
              Symbols
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="html"
              data-i18n="view_html"
              data-only="layout"
            >
              HTML
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="css"
              data-i18n="view_css"
              data-only="layout"
            >
              CSS
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="js"
              data-i18n="view_js"
              data-only="layout"
            >
              JS
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="c"
              data-i18n="view_c"
              data-only="app"
            >
              C
            </button>
            <button
              type="button"
              class="seg-btn"
              data-view="llvm"
              data-i18n="view_llvm"
            >
              LLVM IR
            </button>
          </div>
          <div class="head-end">
            <span id="status" class="status"></span>
            <button class="icon-btn" id="copy-out" type="button" title="Copy">
              <svg
                class="ic-copy"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.4"
                aria-hidden="true"
              >
                <rect x="5.5" y="5.5" width="8" height="9" rx="1.5" />
                <path
                  d="M10.5 5.5V3.5A1.5 1.5 0 0 0 9 2H3.5A1.5 1.5 0 0 0 2 3.5v7A1.5 1.5 0 0 0 3.5 12h2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg
                class="ic-check"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.7"
                aria-hidden="true"
              >
                <path
                  d="M3.5 8.5l3 3 6-6.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <span class="icon-btn-lbl" data-i18n="copy">Copy</span>
            </button>
          </div>
        </div>
        <pre id="output" class="output"></pre>
        <iframe
          id="preview"
          class="preview"
          title="Preview"
          sandbox="allow-scripts"
          hidden
        ></iframe>
      </section>
    </main>
    <script src="examples.js"></script>
    <script src="keywords.js"></script>
    <script src="app.js"></script>
  </body>
</html>
