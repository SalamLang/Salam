# Configuration file for `prek`, a git hook framework written in Rust.
#:schema https://www.schemastore.org/prek.json

default_stages = [
  "pre-commit",
  "pre-push"
  ]
default_language_version = { python = "python3" }
minimum_prek_version = "0.3.4"

[[repos]]
repo = "meta"
hooks = [
  {
    id = "identity",
    name = "run identity check",
    description = "check you have set your git identity",
    priority = 10
  },
  {
    id = "check-hooks-apply",
    name = "run check hooks apply",
    description = "check that all the hooks apply to the repository",
    priority = 10
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "prettier",
    name = "run prettier",
    description = "format files with prettier",
    priority = 40,
    entry = "prettier --write '**/*.md' '**/*.yaml' '**/*.yml'",
    files = '\.(md|ya?ml)$',
    language = "node",
    additional_dependencies = ["prettier@3.8.4"],
    pass_filenames = false
  },
  {
    id = "check-zip-file-is-not-committed",
    name = "check no Zip files are committed",
    description = "Zip files are not allowed in the repository",
    priority = 50,
    language = "fail",
    entry = """
Zip files are not allowed in the repository as they are hard to
track and have security implications. Please remove the zip file from the repository
""",
    files = '(?i)\.zip$'
  }
]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a" # frozen: v2.4.2
hooks = [
  {
    id = "codespell",
    name = "run codespell",
    description = "Check spelling with codespell",
    args = [
      "--ignore-words=.github/linters/codespell.txt",
      "--skip=*.lock,package-lock.json,pnpm-lock.yaml,*.min.js,*.map,*.svg"
    ],
    priority = 50
  }
]

[[repos]]
repo = "https://github.com/Lucas-C/pre-commit-hooks"
rev = "ad1b27d73581aa16cca06fc4a0761fc563ffe8e8" # frozen: v1.5.6
hooks = [
  {
    id = "chmod",
    name = "set file permissions",
    description = "manual hook to be run by macOS or Linux users for a full repository clean up",
    priority = 35,
    args = ['644'],
    files = '\.md$',
    stages = ["manual"]
  }
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "3e8a8703264a2f4a69428a0aa4dcb512790b2c8c" # frozen: v6.0.0
hooks = [
  {
    id = "check-case-conflict",
    name = "run check-case-conflict",
    description = "check for case conflicts in file names",
    priority = 50
  },
  {
    id = "check-illegal-windows-names",
    name = "run check-illegal-windows-names",
    description = "check for Windows-illegal file names",
    priority = 50
  },
  {
    id = "check-json",
    name = "run check-json",
    description = "check JSON files for syntax errors",
    priority = 50
  },
  {
    id = "check-toml",
    name = "run check-toml",
    description = "check TOML files for syntax errors",
    priority = 50
  },
  {
    id = "check-merge-conflict",
    name = "run check-merge-conflict",
    description = "check for merge conflict markers",
    priority = 50
  },
  {
    id = "check-symlinks",
    name = "run check-symlinks",
    description = "checks for symlinks which do not point to anything",
    always_run = true,
    priority = 50
  },
  {
    id = "check-vcs-permalinks",
    name = "run check-vcs-permalinks",
    description = "ensures that links to vcs websites are permalinks",
    priority = 50
  },
  {
    id = "detect-aws-credentials",
    name = "run detect-aws-credentials",
    description = "checks for the existence of AWS secrets that you have set up with the AWS CLI",
    args = ["--allow-missing-credentials"],
    priority = 50
  },
  {
    id = "detect-private-key",
    name = "run detect-private-key",
    description = "checks for the existence of private keys",
    priority = 50
  },
  {
    id = "file-contents-sorter",
    name = "run file-contents-sorter",
    description = "sort the lines in specified files (defaults to alphabetical)",
    args = ["--unique"],
    files = '^\.github/linters/codespell\.txt$',
    priority = 40
  },
  {
    id = "fix-byte-order-marker",
    name = "run fix-byte-order-marker",
    description = "fixes files with UTF-8 byte order markers",
    priority = 20
  },
  {
    id = "forbid-submodules",
    name = "run forbid-submodules",
    description = "forbids any submodules in the repository",
    priority = 50
  },
  {
    id = "trailing-whitespace",
    name = "run trailing-whitespace",
    description = "trims trailing whitespace",
    args = ["--markdown-linebreak-ext=md"],
    priority = 30,
    exclude = '^compiler/src/.*$|\.out$'
  }
]

[[repos]]
repo = "https://github.com/biomejs/pre-commit"
rev = "53525e29648f6e0d6a7b0cfaa67276478d3b1906" # frozen: v2.5.2
hooks = [
  {
    id = "biome-check",
    name = "run biome check",
    description = "format, lint, and organize CSS, HTML, JavaScript, JSON and SVG with Biome",
    priority = 45,
    files = '\.(css|html|js|json|ts)$'
  }
]

[[repos]]
repo = "https://github.com/thlorenz/doctoc.git"
rev = "59dcae910a6ad4bbe8711275b854e3cd5c30f08b" # frozen: v2.5.0
hooks = [
  {
    id = "doctoc",
    name = "add TOC for Markdown files",
    description = "automatically keeps your table of contents up to date",
    files = '^(docs/PLATFORMS|editor/README|CONTRIBUTING|README)\.md$',
    priority = 46
  }
]

[[repos]]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "a4d5d37e66ebcd6b3705204a1d6dbb56dea66338" # frozen: v0.49.0
hooks = [
  {
    id = "markdownlint",
    name = "run markdownlint",
    description = "check Markdown files with markdownlint",
    priority = 50,
    args = ["--config=.github/linters/.markdown-lint.yml"],
    exclude = '^\.github/.*$',
    types = ["markdown"],
    files = '\.md$'
  }
]

[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "745eface02aef23e168a8afb6b5737818efbea95" # frozen: v0.11.0.1
hooks = [
  {
    id = "shellcheck",
    name = "run shellcheck",
    description = "check Shell scripts with shellcheck",
    priority = 50
  }
]

[[repos]]
repo = "https://github.com/scop/pre-commit-shfmt"
rev = "05c1426671b9237fb5e1444dd63aa5731bec0dfb" # frozen: v3.13.1-1
hooks = [
  {
    id = "shfmt",
    name = "run shfmt",
    description = "format shell scripts with shfmt",
    priority = 40,
    stages = ["manual"],
    args = [
      "-w",
      "-i",
      "4"
    ],
    files = '\.sh$'
  }
]

[[repos]]
repo = "https://github.com/pre-commit/mirrors-clang-format"
rev = "dd18dad857d6133e90bbe478f4f2f22ec0030269" # frozen: v22.1.5
hooks = [
  {
    id = "clang-format",
    name = "run clang-format",
    description = "format C code with clang-format (LLVM 21, uses repo-root .clang-format)",
    priority = 40,
    args = ["-i"],
    files = '^compiler/.*\.(c|h)$'
  }
]

[[repos]]
repo = "https://github.com/adrienverge/yamllint"
rev = "cba56bcde1fdd01c1deb3f945e69764c291a6530" # frozen: v1.38.0
hooks = [
  {
    id = "yamllint",
    name = "run yamllint",
    description = "check YAML files with yamllint",
    priority = 50,
    args = [
      "--strict",
      "-c",
      ".github/linters/.yaml-lint.yml"
    ],
    types = ["yaml"],
    files = '\.ya?ml$'
  }
]

[[repos]]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "bebfac867564fbd992e5b45379b4b0568d5cb85b" # frozen: 3.6.1
hooks = [
  {
    id = "editorconfig-checker",
    name = "run editorconfig-checker",
    description = "a tool to verify that your files are in harmony with your .editorconfig",
    priority = 50,
    alias = "ec"
  }
]
